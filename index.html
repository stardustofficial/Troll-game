<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARDUST TROLL GAME- Single Page</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 5px;
            color: #ff4757;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            margin-top: 0;
            color: #ccc;
        }
        canvas {
            background-color: #57606f; /* Level Devil greyish/dark theme vibe */
            border: 4px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 4px;
        }
        .stats {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            background: #2f3542;
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #747d8c;
        }
    </style>
</head>
<body>

    <h1>Level Devil - NOT A Troll Game 😉</h1>
    <p>Controls: Arrow Keys / WASD | Goal: Reach the Orange Door</p>
    
    <canvas id="gameCanvas" width="900" height="450"></canvas>
    
    <div class="stats">Deaths: <span id="deathCount">0</span></div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const deathCountEl = document.getElementById("deathCount");

let deaths = 0;

// Player Setup
let player = {
    x: 50,
    y: 350,
    width: 25,
    height: 25,
    speed: 4.5,
    velX: 0,
    velY: 0,
    jumping: false,
    grounded: false
};

const gravity = 0.5;
const friction = 0.85;

// Game Objects Arrays
let platforms = [];
let traps = [];
let goal = { x: 830, y: 310, width: 30, height: 50 };

function initLevel() {
    // 1. Normal Solid Platforms
    platforms = [
        { x: 0, y: 400, width: 300, height: 50, type: 'solid' },     // Start ground
        { x: 380, y: 400, width: 150, height: 50, type: 'solid' },    // Middle ground
        { x: 600, y: 330, width: 100, height: 120, type: 'solid' },   // High block
        { x: 780, y: 360, width: 120, height: 90, type: 'solid' },    // Goal ground
    ];

    // 2. Troll Platform (Fake Platform - Jo khade hote hi gir jayega)
    platforms.push({
        x: 270, y: 400, width: 110, height: 50, 
        type: 'fake', 
        triggered: false, 
        velY: 0, 
        color: '#2ed573' // Dikhne me normal green platform jaisa
    });

    // 3. Traps Setup
    traps = [
        // Rising Spike (Zameen ke andar chhupi hai)
        { 
            x: 450, y: 400, width: 25, height: 25, 
            targetY: 375, type: 'rising', 
            triggered: false, color: '#ff4757' 
        },
        // Falling Ceiling (Upar aasmaan me chhupa bada block)
        { 
            x: 610, y: -100, width: 80, height: 40, 
            triggerX: 550, type: 'falling', 
            triggered: false, velY: 0, color: '#ff6b81' 
        }
    ];
}

// Controls
let keys = {};
document.body.addEventListener("keydown", (e) => keys[e.code] = true);
document.body.addEventListener("keyup", (e) => keys[e.code] = false);

function update() {
    // Movement Logic
    if (keys["ArrowUp"] || keys["KeyW"] || keys["Space"]) {
        if (!player.jumping && player.grounded) {
            player.jumping = true;
            player.grounded = false;
            player.velY = -10.5;
        }
    }
    if (keys["ArrowLeft"] || keys["KeyA"]) {
        if (player.velX > -player.speed) player.velX--;
    }
    if (keys["ArrowRight"] || keys["KeyD"]) {
        if (player.velX < player.speed) player.velX++;
    }

    player.velX *= friction;
    player.velY += gravity;
    player.grounded = false;

    // Platform Collisions & Fake Platform Logic
    for (let plat of platforms) {
        if (plat.type === 'fake' && plat.triggered) {
            plat.velY += 0.5;
            plat.y += plat.velY;
        }

        // Collision Check
        if (player.x < plat.x + plat.width &&
            player.x + player.width > plat.x &&
            player.y + player.height <= plat.y + 10 &&
            player.y + player.height + player.velY >= plat.y) {
            
            player.jumping = false;
            player.grounded = true;
            player.velY = 0;
            player.y = plat.y - player.height;

            if (plat.type === 'fake') {
                plat.triggered = true; // Player ke pair rakhte hi platform trigger
            }
        }
    }

    // Move Player
    player.x += player.velX;
    player.y += player.velY;

    // Screen Boundaries & Pit Death
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
    if (player.y > canvas.height) {
        playerDie();
    }

    // --- TROLL TRAPS ENGINE ---
    for (let trap of traps) {
        // Trigger Rising Spike
        if (trap.type === 'rising' && Math.abs(player.x - trap.x) < 90) {
            trap.triggered = true;
        }
        if (trap.type === 'rising' && trap.triggered && trap.y > trap.targetY) {
            trap.y -= 6; // Fast pop up
        }

        // Trigger Falling Ceiling
        if (trap.type === 'falling' && player.x > trap.triggerX && player.y < 350) {
            trap.triggered = true;
        }
        if (trap.type === 'falling' && trap.triggered) {
            trap.velY += 0.8;
            trap.y += trap.velY;
        }

        // Trap Collision Check (Death)
        if (player.x < trap.x + trap.width &&
            player.x + player.width > trap.x &&
            player.y < trap.y + trap.height &&
            player.y + player.height > trap.y) {
            playerDie();
        }
    }

    // Win Condition
    if (player.x < goal.x + goal.width &&
        player.x + player.width > goal.x &&
        player.y < goal.y + goal.height &&
        player.y + player.height > goal.y) {
        alert("🎉 Level Cleared! Aap Level Devil se zyada hoshiyar nikle!");
        deaths = 0;
        deathCountEl.innerText = deaths;
        resetPlayer();
        initLevel();
    }
}

function playerDie() {
    deaths++;
    deathCountEl.innerText = deaths;
    resetPlayer();
    initLevel(); // Level reset taaki traps wapas apni jagah aa jayein
}

function resetPlayer() {
    player.x = 50;
    player.y = 300;
    player.velX = 0;
    player.velY = 0;
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Platforms
    for (let plat of platforms) {
        ctx.fillStyle = plat.type === 'fake' ? plat.color : "#2ed573"; // Platform Green
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
    }

    // Draw Traps
    for (let trap of traps) {
        ctx.fillStyle = trap.color;
        ctx.fillRect(trap.x, trap.y, trap.width, trap.height);
    }

    // Draw Goal Door
    ctx.fillStyle = "#ff9f43"; // Orange Door
    ctx.fillRect(goal.x, goal.y, goal.width, goal.height);

    // Draw Player
    ctx.fillStyle = "#ffffff"; // White block character
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

// Start Game
initLevel();
gameLoop();
</script>

</body>
</html>
