<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stardust: 50 Unique Deceptions</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        html, body {
            background: #010206; color: #f8fafc; font-family: 'Segoe UI', Roboto, sans-serif;
            width: 100vw; height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        #gameContainer {
            position: relative; width: 100%; height: 100%; max-width: 854px; max-height: 480px;
            aspect-ratio: 16 / 9; box-shadow: 0 0 50px rgba(168, 85, 247, 0.35);
            border: 1px solid rgba(168, 85, 247, 0.25); border-radius: 16px;
            overflow: hidden; background: #03050a;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #brandingIntro {
            position: absolute; top: 4%; right: 4%; text-align: right; z-index: 30;
            font-family: monospace; pointer-events: none;
        }
        #brandingIntro .brand { font-size: calc(9px + 0.3vw); font-weight: bold; letter-spacing: 2px; color: #a855f7; }
        
        #audioToggleBtn {
            position: absolute; top: 14%; right: 4%; width: 32px; height: 32px;
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 40;
        }
        #audioToggleBtn svg { width: 14px; height: 14px; fill: #a855f7; }

        #orientationOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #010206; z-index: 99999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .phone-icon {
            width: 45px; height: 80px; border: 4px solid #a855f7; border-radius: 8px;
            animation: rotateDevice 2s infinite ease-in-out;
        }
        @keyframes rotateDevice { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } }
        
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; z-index: 10; background: #03050a;
        }
        .hide { display: none !important; }
        
        #welcomeScreen { justify-content: center; align-items: center; position: relative; }
        .welcome-title { font-size: calc(22px + 2vw); font-weight: 900; letter-spacing: 4px; background: linear-gradient(135deg, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-bottom: 25px; }
        .zishan-credits {
            position: absolute; bottom: 5%; font-size: calc(10px + 0.3vw);
            font-weight: bold; letter-spacing: 3px; color: #ec4899;
            text-transform: uppercase; text-shadow: 0 0 10px rgba(236, 72, 153, 0.6);
            font-family: monospace;
        }

        #homeScreen { padding: 4% 6%; }
        .map-scroll-view {
            width: 100%; height: 75%; background: rgba(10, 15, 30, 0.7);
            border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 12px;
            overflow-y: auto; padding: 20px;
        }
        .grid-matrix { display: grid; grid-template-columns: repeat(10, 1fr); gap: 12px; width: 100%; }
        .level-node {
            aspect-ratio: 1; width: 100%; min-width: 35px; max-width: 55px;
            background: #0f111a; border: 2px solid #334155; border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 13px; font-weight: bold; color: #64748b;
        }
        .level-node.unlocked { border-color: #a855f7; color: #e2e8f0; background: #1a102f; }
        .level-node.current { border-color: #f43f5e; color: #fff; background: #31102f; animation: nodePulse 1.4s infinite ease-in-out; }
        .level-node.locked { cursor: not-allowed; opacity: 0.3; }
        @keyframes nodePulse { 0%, 100% { scale: 1; } 50% { scale: 1.05; } }

        #backToMenuBtn {
            position: absolute; top: 4%; left: 4%; padding: 6px 16px; background: rgba(10, 15, 30, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.4); border-radius: 20px;
            color: #c084fc; font-size: 10px; font-weight: bold; cursor: pointer; z-index: 30;
            text-transform: uppercase;
        }
        #victoryOverlay { background: rgba(3, 5, 10, 0.9) !important; justify-content: center; align-items: center; }
        #victoryPopup { background: #0f111a; border: 2px solid #a855f7; border-radius: 14px; padding: 20px 40px; text-align: center; }
        #victoryPopup h2 { font-size: 24px; color: #a855f7; text-transform: uppercase; }

        #controlsOverlay {
            position: absolute; bottom: 6%; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 6%;
            pointer-events: none; z-index: 25;
        }
        .d-pad, .action-pad { display: flex; gap: 16px; pointer-events: auto; }
        .ctrl-btn {
            width: 60px; height: 60px; background: rgba(15, 23, 42, 0.7);
            border: 2px solid rgba(168, 85, 247, 0.3); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; touch-action: none;
        }
        .ctrl-btn svg { width: 30px; height: 30px; fill: #c084fc; }
    </style>
</head>
<body>

    <div id="orientationOverlay"><div class="phone-icon"></div></div>

    <div id="gameContainer">
        <div id="brandingIntro"><div class="brand">QUANTUM SYSTEM ENGINE</div></div>
        <div id="audioToggleBtn" onclick="toggleAudioSystem()">
            <svg id="audioIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </div>

        <button id="backToMenuBtn" class="hide" onclick="exitToMenu()">Abort Mission</button>

        <div id="welcomeScreen" class="screen">
            <h1 class="welcome-title">Cosmic Chaos</h1>
            <button class="btn-launch" onclick="enterLevelSelector()">Start Matrix</button>
            <div class="zishan-credits">Made by Zishan</div>
        </div>

        <div id="homeScreen" class="screen hide">
            <div class="map-scroll-view">
                <div class="grid-matrix" id="matrixContainer"></div>
            </div>
        </div>

        <div id="victoryOverlay" class="screen hide">
            <div id="victoryPopup"><h2 id="victoryText">Dimension Cleared</h2></div>
        </div>

        <div id="controlsOverlay" class="hide">
            <div class="d-pad">
                <div class="ctrl-btn" id="btnLeft"><svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg></div>
                <div class="ctrl-btn" id="btnRight"><svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg></div>
            </div>
            <div class="action-pad">
                <div class="ctrl-btn" id="btnJump"><svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="854" height="480"></canvas>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameState = "WELCOME";
let currentLevel = 1; let maxUnlockedLevel = 1; let deaths = 0;
let isTransitioning = false; let systemHalted = false; let globalTime = 0;

let player = { x: 40, y: 350, width: 22, height: 30, speed: 5.4, velX: 0, velY: 0, jumping: false, grounded: false };
const baseGravity = 0.52; const friction = 0.84;

let stars = []; for(let i=0; i<40; i++) stars.push({ x: Math.random()*854, y: Math.random()*480, size: Math.random()*1.5 });
let platforms = []; let traps = []; let lasers = [];
let portal = { x: 750, y: 340, width: 45, height: 80 };

let audioCtx = null, masterGain = null; let isMuted = false;

function checkOrientation() {
    if (window.innerHeight > window.innerWidth) { document.getElementById("orientationOverlay").style.display = "flex"; systemHalted = true; }
    else { document.getElementById("orientationOverlay").style.display = "none"; systemHalted = false; }
}
window.addEventListener("resize", checkOrientation); window.addEventListener("load", checkOrientation);

function generateMatrixUI() {
    const container = document.getElementById("matrixContainer"); container.innerHTML = "";
    for(let i=1; i<=50; i++) {
        const d = document.createElement("div"); d.id = `node-${i}`;
        d.onclick = () => launchLevel(i); container.appendChild(d);
    }
}

function initPersistence() {
    generateMatrixUI();
    const l = localStorage.getItem("sz50_max"); const c = localStorage.getItem("sz50_curr"); const d = localStorage.getItem("sz50_deaths");
    if(l) maxUnlockedLevel = parseInt(l); if(c) currentLevel = parseInt(c); if(d) deaths = parseInt(d);
    refreshUniverseMap();
}

function saveProgress() {
    localStorage.setItem("sz50_max", maxUnlockedLevel); localStorage.setItem("sz50_curr", currentLevel); localStorage.setItem("sz50_deaths", deaths);
}

function refreshUniverseMap() {
    for(let i=1; i<=50; i++) {
        const n = document.getElementById(`node-${i}`); if(!n) continue;
        n.className = "level-node";
        if(i <= maxUnlockedLevel) { n.classList.add("unlocked"); n.innerText = i; if(i === currentLevel) n.classList.add("current"); }
        else { n.classList.add("locked"); n.innerHTML = `🔒`; }
    }
}

// 100% UNINTERRUPTED PROCEDURAL BLUEPRINT - 50 COMPLETELY DISTINCT GENERATIONS
function loadLevelBlueprint(lvl) {
    platforms = []; traps = []; lasers = [];
    let seed = lvl * 123.45;
    let pseudoRand = (offset) => Math.abs(Math.sin(seed + offset));

    let isFlyingZone = (lvl >= 16 && lvl <= 30);

    // Initial spawning floor anchor unique per level layout
    if (!isFlyingZone) {
        platforms.push({ x: 0, y: 400 + (pseudoRand(1) * 30), width: 100 + (pseudoRand(2) * 50), height: 80 });
    } else {
        platforms.push({ x: 0, y: 320, width: 80, height: 160 });
    }

    // Portal setup based strictly on uniquely distinct offsets
    portal.x = 740 + (pseudoRand(3) * 40);
    portal.y = 150 + (pseudoRand(4) * 230);
    platforms.push({ x: portal.x - 20, y: portal.y + 75, width: 90, height: 200 });

    if (lvl <= 15) {
        // TIER 1: Classic Extreme Gaps + Sudden Ceiling Crushes
        let intermediateX = 220 + (pseudoRand(5) * 120);
        let intermediateY = 380 + (pseudoRand(6) * 40);
        platforms.push({ x: intermediateX, y: intermediateY, width: 110, height: 50 });

        let intermediateX2 = 460 + (pseudoRand(7) * 120);
        platforms.push({ x: intermediateX2, y: 350 + (pseudoRand(8) * 40), width: 90, height: 50 });

        // Level 8 custom logic gap handling perfectly optimized
        if (lvl === 8) {
            platforms.push({ x: 360, y: 410, width: 70, height: 20 });
        }

        traps.push({ x: intermediateX + 30, y: intermediateY - 24, width: 24, height: 24, type: 'static' });
        traps.push({ x: intermediateX2 + 20, y: -50, currentY: -50, width: 35, height: 35, type: 'falling', triggerX: intermediateX, triggered: false });
    } 
    else if (lvl <= 30) {
        // TIER 2: Fixed Sky Floating Jetpack Mode (Absolutely no baseline safety grids)
        let fX1 = 200 + (pseudoRand(10) * 100);
        let fY1 = 180 + (pseudoRand(11) * 100);
        platforms.push({ x: fX1, y: fY1, width: 80, height: 25 });

        let fX2 = 450 + (pseudoRand(12) * 100);
        let fY2 = 220 + (pseudoRand(13) * 100);
        platforms.push({ x: fX2, y: fY2, width: 80, height: 25 });

        // Obstacle beam logic lines matching exact dynamic tracking markers
        lasers.push({ x: fX1 - 40, y1: 20, y2: 360, state: true, timer: Math.floor(pseudoRand(14)*50), speed: 90 + (pseudoRand(15)*60) });
        lasers.push({ x: fX2 - 40, y1: 100, y2: 460, state: true, timer: Math.floor(pseudoRand(16)*50), speed: 80 + (pseudoRand(17)*50) });
    } 
    else if (lvl <= 45) {
        // TIER 3: Re-engineered Quantum Cycles (GLITCH FREE FIXED POSITION TRACKING)
        let mX1 = 180 + (pseudoRand(20) * 80);
        let mY1 = 330;
        platforms.push({ x: mX1, y: mY1, width: 120, height: 25, cycleType: 'sine', baseVal: mY1, drift: 40 + (pseudoRand(21)*30) });

        let mX2 = 420 + (pseudoRand(22) * 80);
        let mY2 = 250;
        platforms.push({ x: mX2, y: mY2, width: 120, height: 25, cycleType: 'cos', baseVal: mY2, drift: 40 + (pseudoRand(23)*30) });

        traps.push({ x: mX1 + 40, y: 0, currentY: -30, width: 30, height: 30, type: 'falling', triggerX: mX1 - 20, triggered: false });
    } 
    else {
        // TIER 4: Ultimate Quantum Core (Complex architectural integrations)
        let sX1 = 160; platforms.push({ x: sX1, y: 380, width: 80, height: 120 });
        let sX2 = 320; platforms.push({ x: sX2, y: 290, width: 80, height: 210 });
        let sX3 = 480; platforms.push({ x: sX3, y: 220, width: 80, height: 280 });
        let sX4 = 620; platforms.push({ x: sX4, y: 310, width: 80, height: 190 });

        lasers.push({ x: 280, y1: 0, y2: 440, state: true, timer: 0, speed: 70 });
        lasers.push({ x: 440, y1: 0, y2: 440, state: true, timer: 25, speed: 70 });
        lasers.push({ x: 590, y1: 0, y2: 440, state: true, timer: 50, speed: 70 });
    }
}

function enterLevelSelector() {
    if(systemHalted) return; gameState = "MENU";
    document.getElementById("welcomeScreen").classList.add("hide");
    document.getElementById("homeScreen").classList.remove("hide");
    refreshUniverseMap();
}

function launchLevel(selectedLvl) {
    if (selectedLvl > maxUnlockedLevel || systemHalted) return;
    currentLevel = selectedLvl; saveProgress();
    document.getElementById("homeScreen").classList.add("hide");
    document.getElementById("controlsOverlay").classList.remove("hide");
    document.getElementById("backToMenuBtn").classList.remove("hide");
    gameState = "PLAYING";
    player.x = 30; player.y = 200; player.velX = 0; player.velY = 0;
    loadLevelBlueprint(currentLevel);
}

function exitToMenu() {
    gameState = "MENU";
    document.getElementById("homeScreen").classList.remove("hide");
    document.getElementById("controlsOverlay").classList.add("hide");
    document.getElementById("backToMenuBtn").classList.add("hide");
    refreshUniverseMap();
}

let activeKeys = { Left: false, Right: false, Jump: false };
function bindControls() {
    const bind = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener("touchstart", (e) => { e.preventDefault(); if(!systemHalted) activeKeys[key] = true; });
        el.addEventListener("touchend", (e) => { e.preventDefault(); activeKeys[key] = false; });
    };
    bind("btnLeft", "Left"); bind("btnRight", "Right"); bind("btnJump", "Jump");
}

function checkCollision(r1, r2) {
    return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y;
}

function update() {
    if (gameState !== "PLAYING" || isTransitioning || systemHalted) return;

    globalTime++;
    let isFlyingZone = (currentLevel >= 16 && currentLevel <= 30);

    // Jetpack engine flight state check vs regular platforming arc gravity lines
    if (isFlyingZone) {
        if (activeKeys.Jump) { player.velY -= 0.65; if(player.velY < -5.2) player.velY = -5.2; }
        else { player.velY += 0.32; }
    } else {
        if (activeKeys.Jump && !player.jumping && player.grounded) {
            player.jumping = true; player.grounded = false;
            player.velY = (currentLevel === 8) ? -13.2 : -11.8;
        }
        player.velY += baseGravity;
    }

    if (activeKeys.Left) { if(player.velX > -player.speed) player.velX -= 0.8; }
    if (activeKeys.Right) { if(player.velX < player.speed) player.velX += 0.8; }
    
    player.velX *= friction; player.grounded = false;

    // Fixed Dynamic tracking loop preventing position flickering/glitches
    if(currentLevel >= 31 && currentLevel <= 45) {
        for(let plat of platforms) {
            if(plat.cycleType === 'sine') plat.y = plat.baseVal + Math.sin(globalTime * 0.04) * plat.drift;
            if(plat.cycleType === 'cos') plat.y = plat.baseVal + Math.cos(globalTime * 0.04) * plat.drift;
        }
    }

    // Precise Collision pass routine sequence handling both X and Y bounds perfectly
    player.x += player.velX;
    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.velX > 0) player.x = plat.x - player.width;
            else if (player.velX < 0) player.x = plat.x + plat.width;
        }
    }

    player.y += player.velY;
    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.velY > 0) {
                player.jumping = false; player.grounded = true; player.velY = 0;
                player.y = plat.y - player.height;
            } else if (player.velY < 0) {
                player.velY = 0; player.y = plat.y + plat.height;
            }
        }
    }

    if(player.x < 0) player.x = 0;
    if(player.x > canvas.width - player.width) player.x = canvas.width - player.width;
    if (player.y > canvas.height || player.y < -40) playerDie();

    for (let trap of traps) {
        if (player.x >= trap.triggerX) trap.triggered = true;
        if (trap.type === 'falling' && trap.triggered) trap.currentY += 8.5;
        
        let box = { x: trap.x, y: trap.type === 'falling' ? trap.currentY : trap.y, width: trap.width, height: trap.height };
        if (checkCollision(player, box)) playerDie();
    }

    for (let laser of lasers) {
        if((globalTime + laser.timer) % laser.speed < laser.speed * 0.6) {
            if(player.x + player.width > laser.x && player.x < laser.x + 4) {
                if(player.y + player.height > laser.y1 && player.y < laser.y2) {
                    playerDie();
                }
            }
        }
    }

    if (checkCollision(player, portal)) triggerNextDimension();
}

function triggerNextDimension() {
    isTransitioning = true;
    document.getElementById("victoryOverlay").classList.remove("hide");
    setTimeout(() => {
        document.getElementById("victoryOverlay").classList.add("hide");
        if (currentLevel === maxUnlockedLevel && maxUnlockedLevel < 50) maxUnlockedLevel++;
        if (currentLevel < 50) currentLevel++;
        saveProgress(); player.x = 30; player.y = 200; player.velX = 0; player.velY = 0;
        loadLevelBlueprint(currentLevel); isTransitioning = false;
    }, 1200);
}

function playerDie() {
    deaths++; saveProgress();
    player.x = 30; player.y = 200; player.velX = 0; player.velY = 0;
    loadLevelBlueprint(currentLevel);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#03050a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "rgba(168, 85, 247, 0.35)";
    for(let s of stars) ctx.fillRect(s.x, s.y, s.size, s.size);

    if (gameState === "WELCOME" || gameState === "MENU" || systemHalted) return;

    for (let plat of platforms) {
        ctx.fillStyle = "#0f111a"; ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        ctx.fillStyle = "#7c3aed"; ctx.fillRect(plat.x, plat.y, plat.width, 3);
    }

    for (let trap of traps) {
        let ty = trap.type === 'falling' ? trap.currentY : trap.y;
        ctx.fillStyle = "#1e112a"; ctx.fillRect(trap.x, ty, trap.width, trap.height);
        ctx.fillStyle = "#ef4444"; ctx.fillRect(trap.x, ty, trap.width, 3);
    }

    for (let laser of lasers) {
        if((globalTime + laser.timer) % laser.speed < laser.speed * 0.6) {
            ctx.strokeStyle = "rgba(255, 50, 50, 0.9)"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(laser.x, laser.y1); ctx.lineTo(laser.x, laser.y2); ctx.stroke();
        }
    }

    let pX = portal.x + portal.width/2, pY = portal.y + portal.height/2;
    ctx.save(); ctx.translate(pX, pY); ctx.rotate(globalTime * 0.04);
    ctx.strokeStyle = isFlyingZone ? "#ec4899" : "#a855f7"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI*2); ctx.stroke(); ctx.restore();

    ctx.fillStyle = isFlyingZone ? "#ec4899" : "#a855f7";
    ctx.beginPath(); ctx.roundRect(player.x, player.y, player.width, player.height, 6); ctx.fill();
    ctx.fillStyle = "#010206"; ctx.fillRect(player.x + 4, player.y + 5, player.width - 8, 7);

    ctx.fillStyle = "#64748b"; ctx.font = "bold 11px monospace";
    ctx.fillText(`MATRIX PHASE: ${currentLevel} / 50`, 35, 35);
    ctx.fillText(`FAILURES: ${deaths}`, 220, 35);
}

function mainGameLoop() { update(); render(); requestAnimationFrame(mainGameLoop); }

initPersistence(); bindControls(); mainGameLoop();
</script>
</body>
</html>
