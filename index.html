<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stardust: Cosmic Deception</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body {
            background: #090d16;
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 854px;
            height: 480px;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.15);
            border-radius: 12px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #0b0f19, #131c2e);
        }
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10;
            background: rgba(9, 13, 22, 0.98);
        }
        .hide { display: none !important; }
        
        .studio-title { font-size: 14px; letter-spacing: 6px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .game-title { font-size: 42px; font-weight: 800; letter-spacing: 3px; background: linear-gradient(135deg, #38bdf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-bottom: 30px; }
        
        .btn {
            padding: 15px 45px; font-size: 18px; font-weight: bold; letter-spacing: 1px;
            color: #fff; background: linear-gradient(135deg, #0284c7, #7c3aed);
            border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        /* BIGGER & SMOOTHER CONTROLS */
        #controlsOverlay {
            position: absolute;
            bottom: 20px; left: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 40px; pointer-events: none; z-index: 5;
        }
        .d-pad, .action-pad { display: flex; gap: 25px; pointer-events: auto; }
        .ctrl-btn {
            width: 80px; height: 80px; background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(56, 189, 248, 0.5); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(6px);
            touch-action: none;
        }
        .ctrl-btn:active { background: rgba(56, 189, 248, 0.5); transform: scale(0.95); }
        .ctrl-btn svg { width: 40px; height: 40px; fill: #38bdf8; }

        #rotateWarning {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #090d16; z-index: 100; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        @media (orientation: portrait) { #rotateWarning { display: flex; } }
    </style>
</head>
<body>

    <div id="rotateWarning">
        <h2 style="text-align: center; padding: 20px;">Please Rotate Your Phone to Landscape 🔄</h2>
    </div>

    <div id="gameContainer">
        <div id="startScreen" class="screen">
            <div class="studio-title">Stardust Studio Presents</div>
            <h1 class="game-title">Cosmic Deception</h1>
            <button class="btn" onclick="startGame()">Start Simulation</button>
        </div>

        <div id="controlsOverlay" class="hide">
            <div class="d-pad">
                <div class="ctrl-btn" id="btnLeft">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </div>
                <div class="ctrl-btn" id="btnRight">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </div>
            </div>
            <div class="action-pad">
                <div class="ctrl-btn" id="btnJump">
                    <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="854" height="480"></canvas>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameState = "MENU";
let currentLevel = 1;
let deaths = 0;

// Player Properties (Neon Capsule)
let player = { x: 60, y: 300, width: 22, height: 32, speed: 5, velX: 0, velY: 0, jumping: false, grounded: false };
const gravity = 0.5;
const friction = 0.82;

let platforms = [];
let traps = [];
let portal = { x: 780, y: 340, width: 30, height: 60 };

// Audio Web API Node Engine
let audioCtx = null;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Eerie ambient suspense drone oscillator
        let osc = audioCtx.createOscillator();
        let gainNode = audioCtx.createGain();
        let filter = audioCtx.createBiquadFilter();

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(58, audioCtx.currentTime); // Deep bass suspense note
        
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(150, audioCtx.currentTime);

        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);

        osc.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
    }
}

function loadLevel(lvl) {
    // Standard Base Level Setup
    platforms = [
        { x: 0, y: 400, width: 200, height: 80, type: 'solid' },
        { x: 680, y: 400, width: 180, height: 80, type: 'solid' }
    ];
    traps = [];

    if (lvl === 1) {
        // LEVEL 1: Hidden Rising Spike (Blends perfectly with the platform)
        platforms.push({ x: 200, y: 400, width: 480, height: 80, type: 'solid' });
        // TriggerX exact trap point par set kiya hai taaki safe na lage
        traps.push({ x: 420, y: 400, width: 24, height: 30, targetY: 370, type: 'rising', triggerX: 410, triggered: false });
    } else if (lvl === 2) {
        // LEVEL 2: Fake Drop Zone
        platforms.push({ x: 200, y: 400, width: 200, height: 80, type: 'solid' });
        platforms.push({ x: 400, y: 400, width: 100, height: 80, type: 'fake', triggered: false, velY: 0 });
        platforms.push({ x: 500, y: 400, width: 180, height: 80, type: 'solid' });
    } else if (lvl === 3) {
        // LEVEL 3: Sky Block Attack (Invisible trap till trigger)
        platforms.push({ x: 200, y: 400, width: 480, height: 80, type: 'solid' });
        traps.push({ x: 490, y: -60, width: 50, height: 50, triggerX: 480, type: 'falling', triggered: false, velY: 0 });
    } else {
        alert("Zone 1 Over! Scaling to next levels...");
        currentLevel = 1;
        loadLevel(1);
    }
}

// Touch Input Handler
let activeKeys = { Left: false, Right: false, Jump: false };
function bindTouchControls() {
    const link = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener("touchstart", (e) => { e.preventDefault(); activeKeys[key] = true; });
        el.addEventListener("touchend", (e) => { e.preventDefault(); activeKeys[key] = false; });
    };
    link("btnLeft", "Left");
    link("btnRight", "Right");
    link("btnJump", "Jump");
}

function startGame() {
    document.getElementById("startScreen").classList.add("hide");
    document.getElementById("controlsOverlay").classList.remove("hide");
    gameState = "PLAYING";
    try { initAudio(); } catch(e) {}
    loadLevel(currentLevel);
}

// Fixed Update Loop for Smooth Physics
function update() {
    if (gameState !== "PLAYING") return;

    if (activeKeys.Jump && !player.jumping && player.grounded) {
        player.jumping = true; player.grounded = false; player.velY = -11;
    }
    if (activeKeys.Left) { if (player.velX > -player.speed) player.velX -= 0.8; }
    if (activeKeys.Right) { if (player.velX < player.speed) player.velX += 0.8; }

    player.velX *= friction; player.velY += gravity; player.grounded = false;

    // Platform Physics Loop
    for (let plat of platforms) {
        if (plat.type === 'fake' && plat.triggered) { plat.velY += 0.5; plat.y += plat.velY; }
        
        if (player.x < plat.x + plat.width && player.x + player.width > plat.x &&
            player.y + player.height <= plat.y + 10 && player.y + player.height + player.velY >= plat.y) {
            player.jumping = false; player.grounded = true; player.velY = 0; player.y = plat.y - player.height;
            if (plat.type === 'fake') plat.triggered = true;
        }
    }

    player.x += player.velX; player.y += player.velY;
    if (player.y > canvas.height) playerDie();

    // Frame-Perfect Trap Checking
    for (let trap of traps) {
        // Instant trigger on exact match coordinates
        if (trap.type === 'rising' && player.x >= trap.triggerX) trap.triggered = true;
        if (trap.type === 'rising' && trap.triggered && trap.y > trap.targetY) trap.y -= 10; // Instantly shoots up

        if (trap.type === 'falling' && player.x >= trap.triggerX) trap.triggered = true;
        if (trap.type === 'falling' && trap.triggered) { trap.velY += 0.9; trap.y += trap.velY; }

        // Precision Collision bounding box
        if (player.x < trap.x + trap.width && player.x + player.width > trap.x &&
            player.y < trap.y + trap.height && player.y + player.height > trap.y) {
            playerDie();
        }
    }

    // Portal Detection
    if (player.x < portal.x + portal.width && player.x + player.width > portal.x &&
        player.y < portal.y + portal.height && player.y + player.height > portal.y) {
        currentLevel++;
        player.x = 60; player.y = 300; player.velX = 0; player.velY = 0;
        loadLevel(currentLevel);
    }
}

function playerDie() {
    deaths++;
    player.x = 60; player.y = 300; player.velX = 0; player.velY = 0;
    loadLevel(currentLevel);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Cosmic Grid Environment Space Lines
    ctx.strokeStyle = "rgba(56, 189, 248, 0.03)";
    ctx.lineWidth = 1;
    for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }

    // Render Platforms
    for (let plat of platforms) {
        ctx.fillStyle = "#1e293b"; // Theme Dark Slate Blue
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        
        ctx.fillStyle = "#6366f1"; // Neon top runner line
        ctx.fillRect(plat.x, plat.y, plat.width, 2);
    }

    // Render Traps (Hidden perfectly using platform color `#1e293b` until active)
    for (let trap of traps) {
        ctx.fillStyle = trap.triggered ? "#ef4444" : "#1e293b"; 
        ctx.fillRect(trap.x, trap.y, trap.width, trap.height);
        if(!trap.triggered) {
            ctx.fillStyle = "#6366f1"; 
            ctx.fillRect(trap.x, trap.y, trap.width, 2); // Blends top border seamlessly
        }
    }

    // Portal Glow Block
    ctx.fillStyle = "#06b6d4"; ctx.fillRect(portal.x, portal.y, portal.width, portal.height);

    // RENDER NEON STARDUST CAPSULE CHARACTER
    ctx.fillStyle = "#38bdf8"; // Glow outer capsule body
    ctx.beginPath();
    ctx.roundRect(player.x, player.y, player.width, player.height, 8);
    ctx.fill();
    // Inner visor core details
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(player.x + 4, player.y + 6, player.width - 8, 6);

    // Data HUD
    if(gameState === "PLAYING") {
        ctx.fillStyle = "#94a3b8"; ctx.font = "bold 13px sans-serif";
        ctx.fillText(`SIMULATION LEVEL: 0${currentLevel} / 100`, 40, 45);
        ctx.fillText(`DEATHS: ${deaths}`, 730, 45);
    }
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

bindTouchControls();
gameLoop();
</script>

</body>
</html>
