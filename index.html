<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Chaos: 50 Deceptions</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        html, body {
            background: #04060a; color: #f8fafc; font-family: 'Segoe UI', Roboto, sans-serif;
            width: 100vw; height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        
        #gameContainer {
            position: relative; width: 100%; height: 100%; max-width: 854px; max-height: 480px;
            aspect-ratio: 16 / 9; box-shadow: 0 0 40px rgba(6, 182, 212, 0.25);
            border: 1px solid rgba(56, 189, 248, 0.15); border-radius: 12px;
            overflow: hidden; background: #070b12;
        }
        
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #brandingIntro {
            position: absolute; top: 4%; right: 4%; text-align: right; z-index: 30;
            font-family: monospace; pointer-events: none;
        }
        #brandingIntro .brand { font-size: calc(10px + 0.4vw); font-weight: bold; letter-spacing: 2px; color: #38bdf8; text-shadow: 0 0 8px rgba(56, 189, 248, 0.6); }

        #audioToggleBtn {
            position: absolute; top: 15%; right: 4%; width: 34px; height: 34px;
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 40;
        }
        #audioToggleBtn svg { width: 16px; height: 16px; fill: #38bdf8; }

        #orientationOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #05070f; z-index: 99999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; z-index: 10; background: #070b12;
        }
        .hide { display: none !important; }
        
        #welcomeScreen { justify-content: center; align-items: center; }
        .welcome-company { font-size: calc(9px + 0.3vw); letter-spacing: 4px; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; font-family: monospace; }
        .welcome-title { font-size: calc(24px + 2vw); font-weight: 900; letter-spacing: 3px; background: linear-gradient(135deg, #22d3ee, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-bottom: 25px; }
        
        .btn-launch {
            padding: 12px 36px; font-size: calc(12px + 0.3vw); font-weight: bold; letter-spacing: 2px;
            color: #fff; background: linear-gradient(135deg, #0284c7, #6d28d9);
            border: none; border-radius: 25px; cursor: pointer;
            box-shadow: 0 6px 15px rgba(109, 40, 217, 0.4);
            text-transform: uppercase; transition: all 0.2s ease;
        }
        
        .zishan-credits {
            position: absolute; bottom: 6%; font-size: calc(10px + 0.2vw);
            font-weight: bold; letter-spacing: 3px; color: #a855f7;
            text-transform: uppercase; font-family: monospace;
            text-shadow: 0 0 8px rgba(168, 85, 247, 0.5);
        }

        #homeScreen { padding: 4%; justify-content: flex-start; align-items: flex-start; }
        .menu-title { font-size: calc(14px + 0.6vw); font-weight: 900; letter-spacing: 2px; background: linear-gradient(135deg, #22d3ee, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-bottom: 10px; }
        
        .map-container {
            width: 100%; height: 75%; background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(99, 102, 241, 0.15); border-radius: 10px;
            position: relative; overflow-y: auto; overflow-x: hidden; padding: 20px;
        }
        
        .orbit-line {
            position: absolute; border: 1px dashed rgba(56, 189, 248, 0.08);
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; width: 85%; height: 200%;
        }
        
        .level-nodes-wrap { position: relative; width: 100%; height: 950px; }

        .level-node {
            position: absolute; width: 36px; height: 36px;
            background: #111827; border: 2px solid #3b4252;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 11px; font-weight: bold; color: #94a3b8;
            transform: translate(-50%, -50%); z-index: 15;
        }
        .level-node.unlocked { border-color: #38bdf8; color: #38bdf8; background: #0f172a; box-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
        .level-node.current { border-color: #a855f7; color: #fff; background: #1e1b4b; animation: pulseGlow 1.4s infinite ease-in-out; }
        .level-node.locked { cursor: not-allowed; opacity: 0.4; }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 6px rgba(168, 85, 247, 0.4); scale: 1; }
            50% { box-shadow: 0 0 16px rgba(168, 85, 247, 0.7); scale: 1.05; }
        }

        #backToMenuBtn {
            position: absolute; top: 4%; left: 4%; padding: 6px 14px; background: rgba(15, 23, 42, 0.75);
            border: 1px solid rgba(56, 189, 248, 0.4); border-radius: 20px;
            color: #38bdf8; font-size: 10px; font-weight: bold; cursor: pointer; z-index: 30;
            text-transform: uppercase;
        }

        #victoryOverlay { background: rgba(5, 7, 15, 0.85) !important; justify-content: center; align-items: center; }
        #victoryPopup { background: rgba(15, 23, 42, 0.95); border: 2px solid #38bdf8; border-radius: 12px; padding: 25px 45px; text-align: center; }
        #victoryPopup h2 { font-size: 24px; font-weight: 900; color: #38bdf8; text-transform: uppercase; }

        #controlsOverlay {
            position: absolute; bottom: 6%; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 6%;
            pointer-events: none; z-index: 25;
        }
        .d-pad, .action-pad { display: flex; gap: 15px; pointer-events: auto; }
        .ctrl-btn {
            width: 62px; height: 62px; background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(56, 189, 248, 0.4); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            touch-action: none;
        }
        .ctrl-btn svg { width: 32px; height: 32px; fill: #38bdf8; }
        .ctrl-btn:active { background: rgba(56, 189, 248, 0.3); }
    </style>
</head>
<body>

    <div id="orientationOverlay"></div>

    <div id="gameContainer">
        <div id="brandingIntro">
            <div class="brand">STARDUST QUANTUM LABS</div>
        </div>

        <div id="audioToggleBtn" onclick="toggleAudioSystem()">
            <svg id="audioIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </div>

        <button id="backToMenuBtn" class="hide" onclick="exitToMenu()">Abort Mission</button>

        <div id="welcomeScreen" class="screen">
            <div class="welcome-company">Stardust Studio Presents</div>
            <h1 class="welcome-title">Cosmic Deception</h1>
            <button class="btn-launch" onclick="enterLevelSelector()">Start Simulation</button>
            <div class="zishan-credits">Made by Zishan</div>
        </div>

        <div id="homeScreen" class="screen hide">
            <h1 class="menu-title">Select Simulation Space</h1>
            <div class="map-container">
                <div class="orbit-line"></div>
                <div class="level-nodes-wrap" id="nodesContainer"></div>
            </div>
        </div>

        <div id="victoryOverlay" class="screen hide">
            <div id="victoryPopup"><h2 id="victoryText">Phase Clear</h2></div>
        </div>

        <div id="controlsOverlay" class="hide">
            <div class="d-pad">
                <div class="ctrl-btn" id="btnLeft"><svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg></div>
                <div class="ctrl-btn" id="btnRight"><svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg></div>
            </div>
            <div class="action-pad">
                <div class="ctrl-btn" id="btnJump"><svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="854" height="480"></canvas>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameState = "WELCOME";
let currentLevel = 1; let maxUnlockedLevel = 1; let deaths = 0;
let isTransitioning = false; let systemHalted = false; let globalTime = 0;

// RE-ENGINEERED PHYSICS ARCHITECTURE
let player = { x: 50, y: 300, width: 22, height: 32, speed: 5.5, velX: 0, velY: 0, jumping: false, grounded: false };
const baseGravity = 0.48; const friction = 0.85;

let stars = []; for(let i=0; i<35; i++) stars.push({ x: Math.random()*854, y: Math.random()*480, size: Math.random()*1.6 });
let platforms = []; let traps = []; let lasers = [];
let portal = { x: 740, y: 330, width: 48, height: 85 };

let audioCtx = null, masterGain = null, audioLoopId = null;
let isMuted = false;

function startSoftMelody() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain(); masterGain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    masterGain.connect(audioCtx.destination);
    let sequence = [293.66, 329.63, 349.23, 392.00, 440.00]; let idx = 0;
    audioLoopId = setInterval(() => {
        if (!audioCtx || isMuted || systemHalted || gameState !== "PLAYING") return;
        let osc = audioCtx.createOscillator(); let g = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(sequence[idx], audioCtx.currentTime);
        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.connect(g); g.connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + 0.45);
        idx = (idx + 1) % sequence.length;
    }, 320);
}

function toggleAudioSystem() {
    isMuted = !isMuted;
    document.getElementById("audioIcon").style.fill = isMuted ? "#64748b" : "#38bdf8";
}

function buildUniqueOrbitMap() {
    const wrap = document.getElementById("nodesContainer"); wrap.innerHTML = "";
    for(let i=1; i<=50; i++) {
        const d = document.createElement("div"); d.id = `node-${i}`; d.className = "level-node";
        let angle = (i * 0.45);
        let radius = 60 + (i * 5.2);
        let leftPos = 50 + Math.cos(angle) * (radius * 0.09);
        let topPos = 40 + (i * 17);
        d.style.left = `${leftPos}%`; d.style.top = `${topPos}px`;
        d.onclick = () => launchLevel(i); wrap.appendChild(d);
    }
}

function initPersistence() {
    buildUniqueOrbitMap();
    const l = localStorage.getItem("z50_max"); const c = localStorage.getItem("z50_curr"); const d = localStorage.getItem("z50_deaths");
    if(l) maxUnlockedLevel = parseInt(l); if(c) currentLevel = parseInt(c); if(d) deaths = parseInt(d);
    refreshUniverseMap();
}

function saveProgress() {
    localStorage.setItem("z50_max", maxUnlockedLevel); localStorage.setItem("z50_curr", currentLevel); localStorage.setItem("z50_deaths", deaths);
}

function refreshUniverseMap() {
    for(let i=1; i<=50; i++) {
        const n = document.getElementById(`node-${i}`); if(!n) continue;
        n.className = "level-node";
        if(i <= maxUnlockedLevel) { n.classList.add("unlocked"); n.innerText = i; if(i === currentLevel) n.classList.add("current"); }
        else { n.classList.add("locked"); n.innerText = "✖"; }
    }
}

// 100% UNINTERRUPTED DISTINCT LEVEL BLUEPRINTS (NO GLITCHES - GUARANTEED ACHIEVABLE GAPS)
function loadLevelBlueprint(lvl) {
    platforms = []; traps = []; lasers = [];
    let isFlyingZone = (lvl >= 16 && lvl <= 30);

    // Dynamic Level Spawning Floor Anchor
    if (!isFlyingZone) { 
        platforms.push({ x: 0, y: 410, width: 140, height: 70 }); 
    } else { 
        platforms.push({ x: 0, y: 340, width: 90, height: 140 }); 
    }

    let seed = lvl * 67.89;
    let pseudo = (o) => Math.abs(Math.sin(seed + o));

    portal.x = 730 + (pseudo(1) * 30); portal.y = 150 + (pseudo(2) * 200);
    platforms.push({ x: portal.x - 15, y: portal.y + 80, width: 110, height: 260 });

    if (lvl <= 15) {
        // TIER 1: Balanced Hardcore Jump Maps
        // LEVEL 1 FIXED POSITION JUMP (Guaranteed structural landing)
        let firstGapWidth = (lvl === 1) ? 120 : 110 + (pseudo(3) * 45);
        let nextPlatX = 140 + firstGapWidth;
        let nextPlatY = 390 + (pseudo(4) * 30);
        
        platforms.push({ x: nextPlatX, y: nextPlatY, width: 110, height: 90 });

        let thirdPlatX = nextPlatX + 110 + (90 + (pseudo(5) * 40));
        platforms.push({ x: thirdPlatX, y: 360 + (pseudo(6) * 40), width: 100, height: 120 });

        if(lvl === 8) { 
            // Level 8 custom momentum landing path
            platforms.push({ x: 320, y: 400, width: 85, height: 30 }); 
        }

        // Suspicious Hidden Traps (Rendered matching platform visual state)
        traps.push({ x: nextPlatX + 35, y: nextPlatY - 24, width: 24, height: 24, type: 'static' });
        traps.push({ x: thirdPlatX + 20, y: -50, currentY: -50, width: 35, height: 35, type: 'falling', triggerX: nextPlatX, triggered: false });
    } 
    else if (lvl <= 30) {
        // TIER 2: Fixed Sky Floating Jetpack Mode
        let fX = 240 + (pseudo(7) * 110); let fY = 190 + (pseudo(8) * 130);
        platforms.push({ x: fX, y: fY, width: 85, height: 25 });
        lasers.push({ x: fX - 50, y1: 10, y2: 380, speed: 75 + Math.floor(pseudo(9)*50), timer: 0 });
    } 
    else if (lvl <= 45) {
        // TIER 3: Re-engineered Shift Loops (Glitch-Free Architecture)
        let mX = 220 + (pseudo(10) * 100); let mY = 330;
        platforms.push({ x: mX, y: mY, width: 140, height: 25, type: 'sine', baseVal: mY, drift: 55 });
        traps.push({ x: mX + 50, y: 0, currentY: -40, width: 32, height: 32, type: 'falling', triggerX: mX - 20, triggered: false });
    } 
    else {
        // TIER 4: Ultimate Core Chaos Architectures
        platforms.push({ x: 170, y: 380, width: 85, height: 100 });
        platforms.push({ x: 350, y: 280, width: 85, height: 200 });
        platforms.push({ x: 530, y: 340, width: 85, height: 140 });
        lasers.push({ x: 300, y1: 0, y2: 450, speed: 60, timer: 0 });
        lasers.push({ x: 480, y1: 0, y2: 450, speed: 60, timer: 20 });
    }
}

function enterLevelSelector() {
    gameState = "MENU";
    document.getElementById("welcomeScreen").classList.add("hide");
    document.getElementById("homeScreen").classList.remove("hide");
    refreshUniverseMap();
}

function launchLevel(selectedLvl) {
    if (selectedLvl > maxUnlockedLevel || systemHalted) return;
    currentLevel = selectedLvl; saveProgress();
    document.getElementById("homeScreen").classList.add("hide");
    document.getElementById("controlsOverlay").classList.remove("hide");
    document.getElementById("backToMenuBtn").classList.remove("hide");
    gameState = "PLAYING";
    player.x = 40; player.y = 220; player.velX = 0; player.velY = 0;
    loadLevelBlueprint(currentLevel);
    try { startSoftMelody(); } catch(e){}
}

function exitToMenu() {
    gameState = "MENU";
    document.getElementById("homeScreen").classList.remove("hide");
    document.getElementById("controlsOverlay").classList.add("hide");
    document.getElementById("backToMenuBtn").classList.add("hide");
    refreshUniverseMap();
}

// SECURE TOUCH-KEYBOARD HOOK CONTROLLERS
let activeKeys = { Left: false, Right: false, Jump: false };
function bindControls() {
    const hook = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener("touchstart", (e) => { e.preventDefault(); activeKeys[key] = true; });
        el.addEventListener("touchend", (e) => { e.preventDefault(); activeKeys[key] = false; });
    };
    hook("btnLeft", "Left"); hook("btnRight", "Right"); hook("btnJump", "Jump");

    window.addEventListener("keydown", (e) => {
        if(e.code === "ArrowLeft" || e.code === "KeyA") activeKeys.Left = true;
        if(e.code === "ArrowRight" || e.code === "KeyD") activeKeys.Right = true;
        if(e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") activeKeys.Jump = true;
    });
    window.addEventListener("keyup", (e) => {
        if(e.code === "ArrowLeft" || e.code === "KeyA") activeKeys.Left = false;
        if(e.code === "ArrowRight" || e.code === "KeyD") activeKeys.Right = false;
        if(e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") activeKeys.Jump = false;
    });
}

function checkCollision(r1, r2) {
    return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y;
}

function update() {
    if (gameState !== "PLAYING" || isTransitioning || systemHalted) return;

    globalTime++;
    let isFlyingZone = (currentLevel >= 16 && currentLevel <= 30);

    if (isFlyingZone) {
        if (activeKeys.Jump) { player.velY -= 0.60; if(player.velY < -4.8) player.velY = -4.8; }
        else { player.velY += 0.30; }
    } else {
        if (activeKeys.Jump && !player.jumping && player.grounded) {
            player.jumping = true; player.grounded = false;
            player.velY = (currentLevel === 8 || currentLevel === 1) ? -12.5 : -11.4;
        }
        player.velY += baseGravity;
    }

    if (activeKeys.Left) { if(player.velX > -player.speed) player.velX -= 0.7; }
    if (activeKeys.Right) { if(player.velX < player.speed) player.velX += 0.7; }
    
    player.velX *= friction; player.grounded = false;

    // Platform Shift Loop Fix
    for(let plat of platforms) {
        if(plat.type === 'sine') plat.y = plat.baseVal + Math.sin(globalTime * 0.04) * plat.drift;
    }

    // Double-Axis Robust Collision Prevention (Eliminates wall clipping & glitch physics)
    player.x += player.velX;
    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.velX > 0) player.x = plat.x - player.width;
            else if (player.velX < 0) player.x = plat.x + plat.width;
        }
    }

    player.y += player.velY;
    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.velY > 0) {
                player.jumping = false; player.grounded = true; player.velY = 0;
                player.y = plat.y - player.height;
            } else if (player.velY < 0) {
                player.velY = 0; player.y = plat.y + plat.height;
            }
        }
    }

    if(player.x < 0) player.x = 0;
    if(player.x > canvas.width - player.width) player.x = canvas.width - player.width;
    if (player.y > canvas.height || player.y < -40) playerDie();

    // Hidden Traps Core Mechanics
    for (let trap of traps) {
        if (player.x >= trap.triggerX) trap.triggered = true;
        if (trap.type === 'falling' && trap.triggered) trap.currentY += 8.0;
        
        let box = { x: trap.x, y: trap.type === 'falling' ? trap.currentY : trap.y, width: trap.width, height: trap.height };
        if (checkCollision(player, box)) playerDie();
    }

    for (let laser of lasers) {
        if((globalTime + laser.timer) % laser.speed < laser.speed * 0.6) {
            if(player.x + player.width > laser.x && player.x < laser.x + 4) {
                if(player.y + player.height > laser.y1 && player.y < laser.y2) {
                    playerDie();
                }
            }
        }
    }

    if (checkCollision(player, portal)) triggerNextLevel();
}

function triggerNextLevel() {
    isTransitioning = true;
    document.getElementById("victoryText").innerText = `Phase 0${currentLevel} Clear`;
    document.getElementById("victoryOverlay").classList.remove("hide");
    setTimeout(() => {
        document.getElementById("victoryOverlay").classList.add("hide");
        if (currentLevel === maxUnlockedLevel && maxUnlockedLevel < 50) maxUnlockedLevel++;
        if (currentLevel < 50) currentLevel++;
        saveProgress(); player.x = 40; player.y = 220; player.velX = 0; player.velY = 0;
        loadLevelBlueprint(currentLevel); isTransitioning = false;
    }, 1200);
}

function playerDie() {
    deaths++; saveProgress();
    player.x = 40; player.y = 220; player.velX = 0; player.velY = 0;
    loadLevelBlueprint(currentLevel);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#070b12"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "rgba(56, 189, 248, 0.3)";
    for(let s of stars) ctx.fillRect(s.x, s.y, s.size, s.size);

    if (gameState === "WELCOME" || gameState === "MENU" || systemHalted) return;

    // Solid Level Platforms
    for (let plat of platforms) {
        ctx.fillStyle = "#111827"; ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        ctx.fillStyle = "#4f46e5"; ctx.fillRect(plat.x, plat.y, plat.width, 3);
    }

    // HIDDEN DECEPTIVE TRAPS (Perfectly matches standard platform architecture colors)
    for (let trap of traps) {
        let ty = trap.type === 'falling' ? trap.currentY : trap.y;
        ctx.fillStyle = "#111827"; ctx.fillRect(trap.x, ty, trap.width, trap.height);
        ctx.fillStyle = "#4f46e5"; ctx.fillRect(trap.x, ty, trap.width, 3); 
    }

    for (let laser of lasers) {
        if((globalTime + laser.timer) % laser.speed < laser.speed * 0.6) {
            ctx.strokeStyle = "rgba(255, 50, 50, 0.85)"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(laser.x, laser.y1); ctx.lineTo(laser.x, laser.y2); ctx.stroke();
        }
    }

    let pX = portal.x + portal.width/2, pY = portal.y + portal.height/2;
    ctx.save(); ctx.translate(pX, pY); ctx.rotate(globalTime * 0.04);
    ctx.strokeStyle = "#22d3ee"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI*2); ctx.stroke(); ctx.restore();

    // CHARACTER ENGINE ASSET
    ctx.fillStyle = "#22d3ee";
    ctx.beginPath(); ctx.roundRect(player.x, player.y, player.width, player.height, 6); ctx.fill();
    ctx.fillStyle = "#070b12"; ctx.fillRect(player.x + 4, player.y + 6, player.width - 8, 8);

    ctx.fillStyle = "#64748b"; ctx.font = "bold 12px monospace";
    ctx.fillText(`PHASE: ${currentLevel} / 50`, 40, 36);
    ctx.fillText(`DEATHS: ${deaths}`, 220, 36);
}

function mainGameLoop() { update(); render(); requestAnimationFrame(mainGameLoop); }

initPersistence(); bindControls(); mainGameLoop();
</script>
</body>
</html>
