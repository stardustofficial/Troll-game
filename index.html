<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust: Cosmic Deception</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #f8fafc;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            font-size: 28px;
            letter-spacing: 2px;
            background: linear-gradient(to right, #38bdf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        p {
            margin: 0 0 15px 0;
            color: #94a3b8;
            font-size: 14px;
        }
        canvas {
            background-color: #0b0f19;
            border: 2px solid #38bdf8;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.2);
            border-radius: 8px;
        }
        .stats {
            margin-top: 15px;
            font-size: 16px;
            letter-spacing: 1px;
            background: rgba(30, 41, 59, 0.7);
            padding: 6px 20px;
            border-radius: 30px;
            border: 1px solid #475569;
            backdrop-filter: blur(4px);
        }
        span {
            color: #f43f5e;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Stardust: Cosmic Deception</h1>
    <p>Use Arrow Keys or WASD | Find the Portal</p>
    
    <canvas id="gameCanvas" width="900" height="450"></canvas>
    
    <div class="stats">DEATHS: <span id="deathCount">0</span></div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const deathCountEl = document.getElementById("deathCount");

let deaths = 0;

// Player Setup (Cosmic Square)
let player = {
    x: 50,
    y: 350,
    width: 24,
    height: 24,
    speed: 4.5,
    velX: 0,
    velY: 0,
    jumping: false,
    grounded: false
};

const gravity = 0.5;
const friction = 0.85;

let platforms = [];
let traps = [];
let portal = { x: 830, y: 310, width: 30, height: 50 };

function initLevel() {
    // Solid Cosmic Platforms
    platforms = [
        { x: 0, y: 400, width: 300, height: 50, type: 'solid' },
        { x: 380, y: 400, width: 150, height: 50, type: 'solid' },
        { x: 600, y: 330, width: 100, height: 120, type: 'solid' },
        { x: 780, y: 360, width: 120, height: 90, type: 'solid' },
    ];

    // Fake Platform (Bhram)
    platforms.push({
        x: 270, y: 400, width: 110, height: 50, 
        type: 'fake', 
        triggered: false, 
        velY: 0
    });

    // Invisible/Trigger Traps
    traps = [
        { 
            x: 450, y: 400, width: 24, height: 24, 
            targetY: 376, type: 'rising', 
            triggered: false
        },
        { 
            x: 610, y: -100, width: 80, height: 40, 
            triggerX: 550, type: 'falling', 
            triggered: false, velY: 0
        }
    ];
}

let keys = {};
document.body.addEventListener("keydown", (e) => keys[e.code] = true);
document.body.addEventListener("keyup", (e) => keys[e.code] = false);

function update() {
    if (keys["ArrowUp"] || keys["KeyW"] || keys["Space"]) {
        if (!player.jumping && player.grounded) {
            player.jumping = true;
            player.grounded = false;
            player.velY = -10.5;
        }
    }
    if (keys["ArrowLeft"] || keys["KeyA"]) {
        if (player.velX > -player.speed) player.velX--;
    }
    if (keys["ArrowRight"] || keys["KeyD"]) {
        if (player.velX < player.speed) player.velX++;
    }

    player.velX *= friction;
    player.velY += gravity;
    player.grounded = false;

    for (let plat of platforms) {
        if (plat.type === 'fake' && plat.triggered) {
            plat.velY += 0.5;
            plat.y += plat.velY;
        }

        if (player.x < plat.x + plat.width &&
            player.x + player.width > plat.x &&
            player.y + player.height <= plat.y + 10 &&
            player.y + player.height + player.velY >= plat.y) {
            
            player.jumping = false;
            player.grounded = true;
            player.velY = 0;
            player.y = plat.y - player.height;

            if (plat.type === 'fake') {
                plat.triggered = true;
            }
        }
    }

    player.x += player.velX;
    player.y += player.velY;

    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
    if (player.y > canvas.height) {
        playerDie();
    }

    for (let trap of traps) {
        if (trap.type === 'rising' && Math.abs(player.x - trap.x) < 90) {
            trap.triggered = true;
        }
        if (trap.type === 'rising' && trap.triggered && trap.y > trap.targetY) {
            trap.y -= 6;
        }

        if (trap.type === 'falling' && player.x > trap.triggerX && player.y < 350) {
            trap.triggered = true;
        }
        if (trap.type === 'falling' && trap.triggered) {
            trap.velY += 0.8;
            trap.y += trap.velY;
        }

        if (player.x < trap.x + trap.width &&
            player.x + player.width > trap.x &&
            player.y < trap.y + trap.height &&
            player.y + player.height > trap.y) {
            playerDie();
        }
    }

    if (player.x < portal.x + portal.width &&
        player.x + player.width > portal.x &&
        player.y < portal.y + portal.height &&
        player.y + player.height > portal.y) {
        alert("✨ Cosmic Paradox Cleared! Next Zone coming soon...");
        deaths = 0;
        deathCountEl.innerText = deaths;
        resetPlayer();
        initLevel();
    }
}

function playerDie() {
    deaths++;
    deathCountEl.innerText = deaths;
    resetPlayer();
    initLevel();
}

function resetPlayer() {
    player.x = 50;
    player.y = 300;
    player.velX = 0;
    player.velY = 0;
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid effect for space vibe
    ctx.strokeStyle = "rgba(56, 189, 248, 0.03)";
    ctx.lineWidth = 1;
    for(let i=0; i<canvas.width; i+=30) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    for(let j=0; j<canvas.height; j+=30) {
        ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
    }

    // Draw Platforms (Cyber Neon Theme)
    for (let plat of platforms) {
        ctx.fillStyle = "#1e293b";
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        
        // Neon top border
        ctx.fillStyle = "#a855f7"; 
        ctx.fillRect(plat.x, plat.y, plat.width, 4);
    }

    // Draw Traps (Danger Neon Red)
    for (let trap of traps) {
        ctx.fillStyle = "#ef4444";
        ctx.fillRect(trap.x, trap.y, trap.width, trap.height);
    }

    // Draw Cosmic Portal (Cyan/Blue gradient vibe)
    ctx.fillStyle = "#06b6d4";
    ctx.fillRect(portal.x, portal.y, portal.width, portal.height);
    ctx.shadowBlur = 0;

    // Draw Player (Glowing White Stardust Core)
    ctx.fillStyle = "#f8fafc";
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

initLevel();
gameLoop();
</script>

</body>
</html>
