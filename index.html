<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cosmic Chaos: 100 Ultimate Chapters</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        html, body {
            background: #030509; color: #f8fafc; font-family: 'Segoe UI', Roboto, sans-serif;
            width: 100vw; height: 100vh; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        
        #gameContainer {
            position: relative; width: 100%; height: 100%; max-width: 854px; max-height: 480px;
            aspect-ratio: 16 / 9; box-shadow: 0 0 50px rgba(168, 85, 247, 0.3);
            border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 14px;
            overflow: hidden; background: #050811;
        }
        
        /* CANVAS IN MAIN POSITION WITH TOUCH THROUGH FOR BUTTONS */
        canvas { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        
        #brandingIntro {
            position: absolute; top: 4%; right: 4%; text-align: right; z-index: 30;
            font-family: monospace; pointer-events: none;
        }
        #brandingIntro .brand { font-size: calc(10px + 0.4vw); font-weight: bold; letter-spacing: 2px; color: #22d3ee; text-shadow: 0 0 8px rgba(34, 211, 238, 0.6); }

        #audioToggleBtn {
            position: absolute; top: 15%; right: 4%; width: 34px; height: 34px;
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(168, 85, 247, 0.4);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 40;
        }
        #audioToggleBtn svg { width: 16px; height: 16px; fill: #22d3ee; }

        #orientationOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #04060c; z-index: 99999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .phone-icon {
            width: 45px; height: 80px; border: 4px solid #a855f7; border-radius: 8px;
            animation: rotateDevice 2s infinite ease-in-out;
        }
        @keyframes rotateDevice { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } }
        
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; z-index: 10; background: #050811;
        }
        .hide { display: none !important; }
        
        #welcomeScreen { justify-content: center; align-items: center; z-index: 12; }
        .welcome-company { font-size: calc(9px + 0.3vw); letter-spacing: 4px; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; font-family: monospace; }
        .welcome-title { font-size: calc(24px + 2vw); font-weight: 900; letter-spacing: 3px; background: linear-gradient(135deg, #a855f7, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-bottom: 25px; }
        
        .btn-launch {
            padding: 12px 36px; font-size: calc(12px + 0.3vw); font-weight: bold; letter-spacing: 2px;
            color: #fff; background: linear-gradient(135deg, #6d28d9, #4f46e5);
            border: none; border-radius: 25px; cursor: pointer;
            box-shadow: 0 6px 18px rgba(109, 40, 217, 0.4);
            text-transform: uppercase; transition: all 0.2s ease;
        }
        
        .zishan-credits {
            position: absolute; bottom: 6%; font-size: calc(10px + 0.2vw);
            font-weight: bold; letter-spacing: 3px; color: #22d3ee;
            text-transform: uppercase; font-family: monospace;
            text-shadow: 0 0 8px rgba(34, 211, 238, 0.6);
        }

        #homeScreen { padding: 4%; justify-content: flex-start; align-items: flex-start; z-index: 11; }
        .menu-title { font-size: calc(13px + 0.5vw); font-weight: 900; letter-spacing: 2px; background: linear-gradient(135deg, #a855f7, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-bottom: 8px; }
        
        .map-container {
            width: 100%; height: 78%; background: rgba(10, 15, 30, 0.6);
            border: 1px solid rgba(168, 85, 247, 0.2); border-radius: 12px;
            position: relative; overflow-y: auto; overflow-x: hidden; padding: 20px;
        }
        
        .orbit-line {
            position: absolute; border: 1px dashed rgba(168, 85, 247, 0.06);
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; width: 90%; height: 400%;
        }
        
        .level-nodes-wrap { position: relative; width: 100%; height: 2100px; }

        .level-node {
            position: absolute; width: 44px; height: 44px;
            background: #0b0f19; border: 2px solid #2d3139;
            border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; font-size: 10px; font-weight: bold; color: #64748b;
            transform: translate(-50%, -50%); z-index: 15;
        }
        .level-node span { font-size: 8px; opacity: 0.7; }
        .level-node.unlocked { border-color: #a855f7; color: #a855f7; background: #0c0a1c; box-shadow: 0 0 10px rgba(168, 85, 247, 0.25); }
        .level-node.current { border-color: #22d3ee; color: #fff; background: #081d26; animation: pulseGlow 1.4s infinite ease-in-out; }
        .level-node.locked { cursor: not-allowed; opacity: 0.3; }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 6px rgba(34, 211, 238, 0.4); scale: 1; }
            50% { box-shadow: 0 0 16px rgba(34, 211, 238, 0.8); scale: 1.05; }
        }

        #backToMenuBtn {
            position: absolute; top: 4%; left: 4%; padding: 6px 14px; background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.4); border-radius: 20px;
            color: #a855f7; font-size: 10px; font-weight: bold; cursor: pointer; z-index: 30;
            text-transform: uppercase;
        }

        #victoryOverlay { background: rgba(3, 5, 9, 0.9) !important; justify-content: center; align-items: center; z-index: 50; }
        #victoryPopup { background: #0b0f19; border: 2px solid #22d3ee; border-radius: 14px; padding: 30px 50px; text-align: center; box-shadow: 0 0 30px rgba(34, 211, 238, 0.3); }
        #victoryPopup h2 { font-size: 26px; font-weight: 900; color: #22d3ee; text-transform: uppercase; letter-spacing: 2px; }

        /* BUTTONS OVERLAID PERFECTLY WITH POINTER EVENTS ACTIVE */
        #controlsOverlay {
            position: absolute; bottom: 5%; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 5%;
            z-index: 20; opacity: 0.8;
        }
        .d-pad, .action-pad { display: flex; gap: 18px; }
        .ctrl-btn {
            width: 64px; height: 64px; background: rgba(11, 15, 25, 0.85);
            border: 2px solid rgba(168, 85, 247, 0.5); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            touch-action: none; cursor: pointer;
        }
        .ctrl-btn svg { width: 34px; height: 34px; fill: #a855f7; }
        .ctrl-btn:active { background: rgba(168, 85, 247, 0.3); }
    </style>
</head>
<body>

    <div id="orientationOverlay"><div class="phone-icon"></div></div>

    <div id="gameContainer">
        <div id="brandingIntro">
            <div class="brand">STARDUST QUANTUM LABS</div>
        </div>

        <div id="audioToggleBtn" onclick="toggleAudioSystem()">
            <svg id="audioIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </div>

        <button id="backToMenuBtn" class="hide" onclick="exitToMenu()">Abort Mission</button>

        <div id="welcomeScreen" class="screen">
            <div class="welcome-company">Stardust Studio Presents</div>
            <h1 class="welcome-title">Cosmic Deception</h1>
            <button class="btn-launch" onclick="enterLevelSelector()">Start Simulation</button>
            <div class="zishan-credits">Made by Zishan</div>
        </div>

        <div id="homeScreen" class="screen hide">
            <h1 class="menu-title">Simulation Map (100 Chapters)</h1>
            <div class="map-container">
                <div class="orbit-line"></div>
                <div class="level-nodes-wrap" id="nodesContainer"></div>
            </div>
        </div>

        <div id="victoryOverlay" class="screen hide">
            <div id="victoryPopup"><h2 id="victoryText">Phase Clear</h2></div>
        </div>

        <div id="controlsOverlay" class="hide">
            <div class="d-pad">
                <div class="ctrl-btn" id="btnLeft"><svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg></div>
                <div class="ctrl-btn" id="btnRight"><svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg></div>
            </div>
            <div class="action-pad">
                <div class="ctrl-btn" id="btnJump"><svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="854" height="480"></canvas>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameState = "WELCOME";
let currentChapter = 1; let currentSubLevel = 1; 
let maxUnlockedChapter = 1; let deaths = 0;
let isTransitioning = false; let systemHalted = false; let globalTime = 0;

let player = { x: 50, y: 300, width: 22, height: 32, speed: 6.0, velX: 0, velY: 0, jumping: false, grounded: false };
const baseGravity = 0.45; const friction = 0.84;
let activePlatform = null; 

let stars = []; for(let i=0; i<45; i++) stars.push({ x: Math.random()*854, y: Math.random()*480, size: Math.random()*1.5 });
let platforms = []; let traps = []; let lasers = [];
let portal = { x: 750, y: 320, width: 48, height: 85 };

let audioCtx = null, masterGain = null, audioLoopId = null;
let isMuted = false;

// VISIBILITY/TAB AUTO-PAUSE INTERCEPTOR
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        if (audioCtx && audioCtx.state === "running") { audioCtx.suspend(); }
    } else {
        if (audioCtx && audioCtx.state === "suspended" && !isMuted) { audioCtx.resume(); }
    }
});

function checkOrientation() {
    if (window.innerHeight > window.innerWidth) { 
        document.getElementById("orientationOverlay").style.display = "flex"; 
        systemHalted = true; 
    } else { 
        document.getElementById("orientationOverlay").style.display = "none"; 
        systemHalted = false; 
    }
}
window.addEventListener("resize", checkOrientation);
window.addEventListener("load", checkOrientation);

function startSoftMelody() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain(); 
    masterGain.gain.setValueAtTime(0.85, audioCtx.currentTime); // LOUDER VOLUME SET
    masterGain.connect(audioCtx.destination);
    
    let sequence = [293.66, 329.63, 349.23, 392.00, 440.00]; let idx = 0;
    audioLoopId = setInterval(() => {
        if (!audioCtx || isMuted || systemHalted || gameState !== "PLAYING" || document.hidden) return;
        let osc = audioCtx.createOscillator(); let g = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(sequence[idx], audioCtx.currentTime);
        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.connect(g); g.connect(masterGain); osc.start(); osc.stop(audioCtx.currentTime + 0.45);
        idx = (idx + 1) % sequence.length;
    }, 320);
}

function toggleAudioSystem() {
    isMuted = !isMuted;
    document.getElementById("audioIcon").style.fill = isMuted ? "#64748b" : "#22d3ee";
    if (audioCtx) {
        masterGain.gain.setValueAtTime(isMuted ? 0 : 0.85, audioCtx.currentTime);
    }
}

function buildUniqueOrbitMap() {
    const wrap = document.getElementById("nodesContainer"); wrap.innerHTML = "";
    for(let i=1; i<=100; i++) {
        const d = document.createElement("div"); d.id = `node-${i}`; d.className = "level-node";
        let angle = (i * 0.40);
        let radius = 60 + (i * 5.0);
        let leftPos = 50 + Math.cos(angle) * (radius * 0.09);
        let topPos = 40 + (i * 19);
        d.style.left = `${leftPos}%`; d.style.top = `${topPos}px`;
        d.innerHTML = `${i}<span>P-5</span>`;
        d.onclick = () => launchChapter(i); wrap.appendChild(d);
    }
}

function initPersistence() {
    buildUniqueOrbitMap();
    const c = localStorage.getItem("zc_max"); const d = localStorage.getItem("zc_deaths");
    if(c) maxUnlockedChapter = parseInt(c); if(d) deaths = parseInt(d);
    refreshUniverseMap();
}

function saveProgress() {
    localStorage.setItem("zc_max", maxUnlockedChapter); localStorage.setItem("zc_deaths", deaths);
}

function refreshUniverseMap() {
    for(let i=1; i<=100; i++) {
        const n = document.getElementById(`node-${i}`); if(!n) continue;
        n.className = "level-node";
        if(i <= maxUnlockedChapter) { n.classList.add("unlocked"); if(i === currentChapter) n.classList.add("current"); }
        else { n.classList.add("locked"); }
    }
}

function loadChapterBlueprint(ch, sub) {
    platforms = []; traps = []; lasers = [];
    activePlatform = null;
    
    let seed = (ch * 73) + (sub * 31.7);
    let pseudo = (o) => Math.abs(Math.sin(seed + o));

    let baseWidth = 140 + (pseudo(1) * 30);
    let baseY = 390 + (pseudo(2) * 20);
    platforms.push({ x: 0, y: baseY, width: baseWidth, height: 100, type: 'static', vy: 0 });

    portal.x = 750 + (pseudo(3) * 40);
    portal.y = 150 + (pseudo(4) * 160);
    platforms.push({ x: portal.x - 15, y: portal.y + 80, width: 130, height: 320, type: 'static', vy: 0 });

    let currentX = baseWidth;
    let index = 0;

    while(currentX < portal.x - 130) {
        index++;
        let gap = 90 + (pseudo(currentX + index) * 35);
        let platWidth = 100 + (pseudo(currentX + index + 2) * 40);
        let platY = 300 + (pseudo(currentX + index + 4) * 95);
        let platX = currentX + gap;

        let isMoving = (ch > 50) || (ch <= 50 && pseudo(platX) > 0.6);
        
        platforms.push({
            x: platX,
            y: platY,
            width: platWidth,
            height: 220,
            type: isMoving ? 'sine' : 'static',
            baseVal: platY,
            drift: 45 + (pseudo(platX) * 35),
            speedModifier: 0.03 + (pseudo(platY) * 0.02),
            vy: 0
        });

        if (pseudo(platX) > 0.45) {
            traps.push({ x: platX + (platWidth / 4), y: -60, currentY: -60, width: 36, height: 34, type: 'falling', triggerX: platX - 50, triggered: false });
        } else {
            traps.push({ x: platX + 25, y: platY - 20, width: 25, height: 20, type: 'static' });
        }

        currentX = platX + platWidth;
    }

    if (ch > 50 || sub >= 4) {
        lasers.push({ x: 260 + (pseudo(40)*140), y1: 0, y2: 440, speed: 60 + Math.floor(pseudo(9)*40), timer: 0 });
        lasers.push({ x: 500 + (pseudo(41)*120), y1: 0, y2: 440, speed: 65, timer: 30 });
    }
}

function enterLevelSelector() {
    if(systemHalted) return;
    gameState = "MENU";
    document.getElementById("welcomeScreen").classList.add("hide");
    document.getElementById("homeScreen").classList.remove("hide");
    refreshUniverseMap();
}

function launchChapter(ch) {
    if (ch > maxUnlockedChapter || systemHalted) return;
    currentChapter = ch; currentSubLevel = 1; saveProgress();
    document.getElementById("homeScreen").classList.add("hide");
    document.getElementById("controlsOverlay").classList.remove("hide");
    document.getElementById("backToMenuBtn").classList.remove("hide");
    gameState = "PLAYING";
    resetPlayerState();
    loadChapterBlueprint(currentChapter, currentSubLevel);
    try { startSoftMelody(); } catch(e){}
}

function resetPlayerState() {
    player.x = 35; player.y = 200; player.velX = 0; player.velY = 0;
    player.jumping = false; player.grounded = false; activePlatform = null;
}

function exitToMenu() {
    gameState = "MENU";
    document.getElementById("homeScreen").classList.remove("hide");
    document.getElementById("controlsOverlay").classList.add("hide");
    document.getElementById("backToMenuBtn").classList.add("hide");
    refreshUniverseMap();
}

let activeKeys = { Left: false, Right: false, Jump: false };
function bindControls() {
    const hook = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener("touchstart", (e) => { e.preventDefault(); if(!systemHalted) activeKeys[key] = true; });
        el.addEventListener("touchend", (e) => { e.preventDefault(); activeKeys[key] = false; });
    };
    hook("btnLeft", "Left"); hook("btnRight", "Right"); hook("btnJump", "Jump");

    window.addEventListener("keydown", (e) => {
        if(e.code === "ArrowLeft" || e.code === "KeyA") activeKeys.Left = true;
        if(e.code === "ArrowRight" || e.code === "KeyD") activeKeys.Right = true;
        if(e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") activeKeys.Jump = true;
    });
    window.addEventListener("keyup", (e) => {
        if(e.code === "ArrowLeft" || e.code === "KeyA") activeKeys.Left = false;
        if(e.code === "ArrowRight" || e.code === "KeyD") activeKeys.Right = false;
        if(e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") activeKeys.Jump = false;
    });
}

function checkCollision(r1, r2) {
    return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y;
}

function update() {
    if (gameState !== "PLAYING" || isTransitioning || systemHalted) return;

    globalTime++;

    for(let plat of platforms) {
        if(plat.type === 'sine') {
            let lastY = plat.y;
            plat.y = plat.baseVal + Math.sin(globalTime * plat.speedModifier) * plat.drift;
            plat.vy = plat.y - lastY; 
        }
    }

    if (activeKeys.Left) { if(player.velX > -player.speed) player.velX -= 0.8; }
    if (activeKeys.Right) { if(player.velX < player.speed) player.velX += 0.8; }
    player.velX *= friction;

    if (activeKeys.Jump && player.grounded && !player.jumping) {
        player.jumping = true; player.grounded = false;
        player.velY = -12.4; 
        activePlatform = null;
    }

    if (player.grounded && activePlatform) {
        player.y += activePlatform.vy;
        player.velY = 0;
    } else {
        player.velY += baseGravity;
    }

    player.x += player.velX;
    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.velX > 0) player.x = plat.x - player.width;
            else if (player.velX < 0) player.x = plat.x + plat.width;
        }
    }

    player.y += player.velY;
    let currentGrounded = false;
    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.velY >= 0 && (player.y + player.height - player.velY <= plat.y + 12)) {
                player.jumping = false; currentGrounded = true; player.velY = 0;
                player.y = plat.y - player.height;
                activePlatform = plat;
            } else if (player.velY < 0) {
                player.velY = 0; player.y = plat.y + plat.height;
            }
        }
    }
    player.grounded = currentGrounded;
    if(!player.grounded) activePlatform = null;

    if(player.x < 0) player.x = 0;
    if(player.x > canvas.width - player.width) player.x = canvas.width - player.width;
    if (player.y > canvas.height || player.y < -50) playerDie();

    for (let trap of traps) {
        if (player.x >= trap.triggerX) trap.triggered = true;
        if (trap.type === 'falling' && trap.triggered) trap.currentY += 8.5;
        
        let box = { x: trap.x, y: trap.type === 'falling' ? trap.currentY : trap.y, width: trap.width, height: trap.height };
        if (checkCollision(player, box)) playerDie();
    }

    for (let laser of lasers) {
        if((globalTime + laser.timer) % laser.speed < laser.speed * 0.6) {
            if(player.x + player.width > laser.x && player.x < laser.x + 4) {
                if(player.y + player.height > laser.y1 && player.y < laser.y2) {
                    playerDie();
                }
            }
        }
    }

    if (checkCollision(player, portal)) triggerNextSubLevel();
}

function triggerNextSubLevel() {
    isTransitioning = true;
    document.getElementById("victoryText").innerText = `Sub-Phase 0${currentSubLevel} Stable`;
    document.getElementById("victoryOverlay").classList.remove("hide");
    
    setTimeout(() => {
        document.getElementById("victoryOverlay").classList.add("hide");
        if (currentSubLevel < 5) {
            currentSubLevel++;
        } else {
            document.getElementById("victoryText").innerText = `Chapter ${currentChapter} Mastered`;
            if (currentChapter === maxUnlockedChapter && maxUnlockedChapter < 100) maxUnlockedChapter++;
            if (currentChapter < 100) currentChapter++;
            currentSubLevel = 1;
        }
        saveProgress(); resetPlayerState();
        loadChapterBlueprint(currentChapter, currentSubLevel); isTransitioning = false;
    }, 1200);
}

function playerDie() {
    deaths++; saveProgress(); resetPlayerState();
    loadChapterBlueprint(currentChapter, currentSubLevel);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#050811"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "rgba(168, 85, 247, 0.2)";
    for(let s of stars) ctx.fillRect(s.x, s.y, s.size, s.size);

    if (gameState === "WELCOME" || gameState === "MENU" || systemHalted) return;

    for (let plat of platforms) {
        ctx.fillStyle = "#0f1322"; ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        ctx.fillStyle = "#6366f1"; ctx.fillRect(plat.x, plat.y, plat.width, 3);
    }

    for (let trap of traps) {
        let ty = trap.type === 'falling' ? trap.currentY : trap.y;
        ctx.fillStyle = "#0f1322"; ctx.fillRect(trap.x, ty, trap.width, trap.height);
        ctx.fillStyle = "#6366f1"; ctx.fillRect(trap.x, ty, trap.width, 3);
        
        if(trap.type === 'falling') {
            ctx.fillStyle = "#ef4444";
            let spikeCount = 3; let spikeWidth = trap.width / spikeCount;
            for(let j=0; j<spikeCount; j++) {
                ctx.beginPath();
                ctx.moveTo(trap.x + (j * spikeWidth), ty);
                ctx.lineTo(trap.x + (j * spikeWidth) + (spikeWidth / 2), ty - 12);
                ctx.lineTo(trap.x + ((j + 1) * spikeWidth), ty);
                ctx.fill();
            }
        }
    }

    for (let laser of lasers) {
        if((globalTime + laser.timer) % laser.speed < laser.speed * 0.6) {
            ctx.strokeStyle = "rgba(239, 68, 68, 0.9)"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(laser.x, laser.y1); ctx.lineTo(laser.x, laser.y2); ctx.stroke();
        }
    }

    let pX = portal.x + portal.width/2, pY = portal.y + portal.height/2;
    ctx.save(); ctx.translate(pX, pY); ctx.rotate(globalTime * 0.04);
    ctx.strokeStyle = "#22d3ee"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, 24, 0, Math.PI*2); ctx.stroke(); ctx.restore();

    ctx.fillStyle = "#22d3ee";
    ctx.beginPath(); ctx.roundRect(player.x, player.y, player.width, player.height, 6); ctx.fill();
    ctx.fillStyle = "#050811"; ctx.fillRect(player.x + 4, player.y + 6, player.width - 8, 8);

    ctx.fillStyle = "#64748b"; ctx.font = "bold 11px monospace";
    ctx.fillText(`CHAPTER: ${currentChapter} [SUB: ${currentSubLevel}/5]`, 40, 36);
    ctx.fillText(`DEATHS: ${deaths}`, 260, 36);
}

function mainGameLoop() { update(); render(); requestAnimationFrame(mainGameLoop); }

initPersistence(); bindControls(); mainGameLoop();
</script>
</body>
</html>
