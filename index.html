<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stardust: Cosmic Deception Core</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body {
            background: #04060a;
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 854px;
            height: 480px;
            box-shadow: 0 0 60px rgba(6, 182, 212, 0.25);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 16px;
            overflow: hidden;
            background: #070b12;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Premium Top-Right Company Intro Branding */
        .studio-intro {
            position: absolute;
            top: 20px; right: 25px;
            text-align: right; z-index: 30;
            font-family: monospace; pointer-events: none;
        }
        .studio-intro .brand { font-size: 13px; font-weight: bold; letter-spacing: 3px; color: #38bdf8; text-shadow: 0 0 8px rgba(56, 189, 248, 0.6); }
        .studio-intro .sub { font-size: 9px; letter-spacing: 1px; color: #64748b; margin-top: 2px; }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            z-index: 10; background: #070b12;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        .hide { display: none !important; opacity: 0; }
        
        /* Main Welcome Intro Screen */
        #welcomeScreen { justify-content: center; align-items: center; }
        .welcome-company { font-size: 13px; letter-spacing: 6px; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; font-family: monospace; }
        .welcome-title { font-size: 44px; font-weight: 900; letter-spacing: 4px; background: linear-gradient(135deg, #22d3ee, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-bottom: 35px; }
        
        .btn-launch {
            padding: 16px 45px; font-size: 16px; font-weight: bold; letter-spacing: 2px;
            color: #fff; background: linear-gradient(135deg, #0284c7, #6d28d9);
            border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(109, 40, 217, 0.45);
            text-transform: uppercase; transition: all 0.2s ease;
        }
        .btn-launch:active { transform: scale(0.95); box-shadow: 0 3px 10px rgba(109, 40, 217, 0.4); }

        /* Custom Space Level Selector Map Screen */
        #homeScreen { padding: 40px; justify-content: flex-start; align-items: flex-start; }
        .menu-title { font-size: 28px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(135deg, #22d3ee, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-bottom: 25px; }
        
        .map-container {
            width: 100%; height: 280px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 12px; position: relative; overflow: hidden;
        }
        .orbit-line {
            position: absolute; border: 1px dashed rgba(56, 189, 248, 0.12);
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .orbit-1 { width: 220px; height: 140px; }
        .orbit-2 { width: 460px; height: 200px; }
        .orbit-3 { width: 700px; height: 260px; }
        
        .level-node {
            position: absolute; width: 44px; height: 44px;
            background: #0f172a; border: 2px solid #475569;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 14px; font-weight: bold; color: #64748b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 15;
            transform: translate(-50%, -50%);
        }
        .level-node.unlocked { border-color: #38bdf8; color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.25); }
        .level-node.unlocked:hover { background: #38bdf8; color: #070b12; scale: 1.15; box-shadow: 0 0 25px #38bdf8; }
        .level-node.current { border-color: #a855f7; color: #a855f7; animation: pulseGlow 1.5s infinite ease-in-out; }
        .level-node.locked { cursor: not-allowed; opacity: 0.35; }
        .level-node.locked svg { width: 14px; height: 14px; fill: #475569; }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px rgba(168, 85, 247, 0.4); }
            50% { box-shadow: 0 0 25px rgba(168, 85, 247, 0.7); scale: 1.05; }
            100% { box-shadow: 0 0 10px rgba(168, 85, 247, 0.4); }
        }

        #backToMenuBtn {
            position: absolute; top: 20px; left: 25px;
            padding: 8px 16px; background: rgba(15, 23, 42, 0.75);
            border: 1px solid rgba(56, 189, 248, 0.4); border-radius: 20px;
            color: #38bdf8; font-size: 11px; font-weight: bold; cursor: pointer; z-index: 30;
            letter-spacing: 1px; text-transform: uppercase; backdrop-filter: blur(5px);
        }

        /* Success Layer overlay */
        #victoryOverlay { background: rgba(5, 7, 15, 0.8); backdrop-filter: blur(4px); justify-content: center; align-items: center; }
        #victoryPopup {
            background: rgba(15, 23, 42, 0.95); border: 2px solid #eab308;
            box-shadow: 0 0 40px rgba(234, 179, 8, 0.3); border-radius: 16px;
            padding: 35px 60px; text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #victoryPopup h2 { font-size: 36px; font-weight: 900; color: #eab308; letter-spacing: 3px; margin-bottom: 8px; text-transform: uppercase; }

        /* Dynamic On-Screen Controls Pad mapping */
        #controlsOverlay {
            position: absolute; bottom: 25px; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 50px;
            pointer-events: none; z-index: 5;
        }
        .d-pad, .action-pad { display: flex; gap: 25px; pointer-events: auto; }
        .ctrl-btn {
            width: 80px; height: 80px; background: rgba(15, 23, 42, 0.7);
            border: 2px solid rgba(56, 189, 248, 0.5); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(8px); touch-action: none;
        }
        .ctrl-btn:active { background: rgba(56, 189, 248, 0.3); transform: scale(0.92); }
        .ctrl-btn svg { width: 40px; height: 40px; fill: #38bdf8; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div class="studio-intro">
            <div class="brand">STARDUST QUANTUM LABS</div>
            <div class="sub">SIMULATION MODULE v3.5</div>
        </div>

        <button id="backToMenuBtn" class="hide" onclick="exitToMenu()">Abort Mission</button>

        <div id="welcomeScreen" class="screen">
            <div class="welcome-company">Stardust Studio Presents</div>
            <h1 class="welcome-title">Cosmic Deception</h1>
            <button class="btn-launch" onclick="enterLevelSelector()">Start Simulation</button>
        </div>

        <div id="homeScreen" class="screen hide">
            <h1 class="menu-title">Select Simulation Phase</h1>
            <div class="map-container">
                <div class="orbit-line orbit-1"></div>
                <div class="orbit-line orbit-2"></div>
                <div class="orbit-line orbit-3"></div>
                
                <div class="level-node" id="node-1" style="top:50%; left:50%;" onclick="launchLevel(1)">1</div>
                <div class="level-node" id="node-2" style="top:50%; left:37%;" onclick="launchLevel(2)">2</div>
                <div class="level-node" id="node-3" style="top:35%; left:46%;" onclick="launchLevel(3)">3</div>
                <div class="level-node" id="node-4" style="top:42%; left:63%;" onclick="launchLevel(4)">4</div>
                <div class="level-node" id="node-5" style="top:68%; left:56%;" onclick="launchLevel(5)">5</div>
                <div class="level-node" id="node-6" style="top:25%; left:25%;" onclick="launchLevel(6)">6</div>
                <div class="level-node" id="node-7" style="top:18%; left:68%;" onclick="launchLevel(7)">7</div>
                <div class="level-node" id="node-8" style="top:80%; left:34%;" onclick="launchLevel(8)">8</div>
                <div class="level-node" id="node-9" style="top:75%; left:78%;" onclick="launchLevel(9)">9</div>
                <div class="level-node" id="node-10" style="top:50%; left:90%;" onclick="launchLevel(10)">10</div>
            </div>
        </div>

        <div id="victoryOverlay" class="screen hide">
            <div id="victoryPopup">
                <h2 id="victoryText">Phase Clear</h2>
                <p style="color: #94a3b8; font-size: 13px; letter-spacing: 2px; font-weight: 600;">SYNCHRONIZING TIMELINE...</p>
            </div>
        </div>

        <div id="controlsOverlay" class="hide">
            <div class="d-pad">
                <div class="ctrl-btn" id="btnLeft">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
                </div>
                <div class="ctrl-btn" id="btnRight">
                    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </div>
            </div>
            <div class="action-pad">
                <div class="ctrl-btn" id="btnJump">
                    <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="854" height="480"></canvas>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let gameState = "WELCOME";
let currentLevel = 1;
let maxUnlockedLevel = 1;
let deaths = 0;
let isTransitioning = false;
let portalRotation = 0;

// High-Precision Physics Vector Model
let player = { x: 40, y: 350, width: 22, height: 32, speed: 4.8, velX: 0, velY: 0, jumping: false, grounded: false };
const gravity = 0.52;
const friction = 0.82;

let stars = [];
let shootingStars = [];
for(let i=0; i<45; i++) stars.push({ x: Math.random()*854, y: Math.random()*480, size: Math.random()*2, alpha: Math.random() });

let platforms = [];
let traps = [];
let portal = { x: 730, y: 330, width: 50, height: 90 }; // Tuned vector position

// AUDIO SYNTH ARPEGIATOR WITH AUTO-PAUSE FOR SAFETY
let audioCtx = null;
let masterGain = null;
let audioLoopId = null;

function startSoftMelody() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0.2, audioCtx.currentTime); // Soft comfortable volume
    masterGain.connect(audioCtx.destination);

    let melody = [293.66, 329.63, 349.23, 392.00, 440.00, 523.25]; 
    let index = 0;

    audioLoopId = setInterval(() => {
        if (!audioCtx || audioCtx.state !== "running" || isTransitioning) return;
        
        let osc = audioCtx.createOscillator();
        let gainNode = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(melody[index], audioCtx.currentTime);

        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);

        osc.connect(gainNode);
        gainNode.connect(masterGain);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.45);

        index = (index + 1) % melody.length;
    }, 280);
}

// SMART AUTOMATED TAB-SWITCH FOCUS AND UNFOCUS SOUND CONTROL
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        if (audioCtx && audioCtx.state === "running") {
            audioCtx.suspend();
        }
    } else {
        if (audioCtx && audioCtx.state === "suspended") {
            audioCtx.resume();
        }
    }
});

// Also suspend sound if user hits browser back or unloads window completely
window.addEventListener("beforeunload", () => {
    if(audioCtx) {
        clearInterval(audioLoopId);
        audioCtx.close();
    }
});

// LOCAL STORAGE REFRESH RESILIENCE ENGINE
function initPersistence() {
    const savedLevel = localStorage.getItem("stardust_max_lvl");
    const savedCurrent = localStorage.getItem("stardust_curr_lvl");
    const savedDeaths = localStorage.getItem("stardust_deaths");
    
    if (savedLevel) maxUnlockedLevel = parseInt(savedLevel);
    if (savedCurrent) currentLevel = parseInt(savedCurrent);
    if (savedDeaths) deaths = parseInt(savedDeaths);
    
    refreshUniverseMap();
}

function saveProgress() {
    localStorage.setItem("stardust_max_lvl", maxUnlockedLevel);
    localStorage.setItem("stardust_curr_lvl", currentLevel);
    localStorage.setItem("stardust_deaths", deaths);
}

function refreshUniverseMap() {
    for(let i=1; i<=10; i++) {
        const node = document.getElementById(`node-${i}`);
        if (!node) continue;
        node.className = "level-node";
        
        if (i <= maxUnlockedLevel) {
            node.classList.add("unlocked");
            if (i === currentLevel) node.classList.add("current");
        } else {
            node.classList.add("locked");
            node.innerHTML = `<svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>`;
        }
    }
}

// 100% CROSSABLE GEOMETRY MAPPING Engine
function loadLevel(lvl) {
    platforms = []; traps = [];
    platforms.push({ x: 0, y: 430, width: 140, height: 50 }); // Safe Spawn Stand

    switch(lvl) {
        case 1:
            portal.x = 730; portal.y = 340;
            platforms.push({ x: 140, y: 430, width: 540, height: 50 });
            platforms.push({ x: 680, y: 430, width: 180, height: 50 });
            traps.push({ x: 320, y: 430, currentY: 430, width: 35, height: 40, targetY: 395, type: 'rising', triggerX: 260, triggered: false });
            break;
        case 2:
            portal.x = 730; portal.y = 140;
            platforms.push({ x: 200, y: 350, width: 160, height: 30 });
            platforms.push({ x: 420, y: 265, width: 160, height: 30 });
            platforms.push({ x: 650, y: 230, width: 210, height: 30 });
            traps.push({ x: 460, y: -45, currentY: -45, width: 45, height: 45, triggerX: 430, type: 'falling', triggered: false });
            break;
        case 3: // PERFECTLY BALANCED ARC DISTANCE GAP: Crossable under simple physics jump range
            portal.x = 60; portal.y = 130;
            platforms.push({ x: 160, y: 360, width: 700, height: 30 });
            platforms.push({ x: 380, y: 260, width: 220, height: 30 }); // Easily Reachable Middle Jump Node
            platforms.push({ x: 0, y: 220, width: 140, height: 30 });   // Connected to Exit gate
            traps.push({ x: 280, y: 360, currentY: 360, width: 35, height: 35, targetY: 325, type: 'rising', triggerX: 220, triggered: false });
            break;
        case 4:
            portal.x = 740; portal.y = 340;
            platforms.push({ x: 180, y: 430, width: 520, height: 50 });
            platforms.push({ x: 240, y: 320, width: 420, height: 30 }); 
            platforms.push({ x: 700, y: 430, width: 160, height: 50 });
            traps.push({ x: 550, y: -80, currentY: -80, width: 40, height: 120, type: 'falling', triggerX: 480, triggered: false });
            break;
        case 5:
            portal.x = 740; portal.y = 110;
            platforms.push({ x: 180, y: 350, width: 110, height: 130 });
            platforms.push({ x: 440, y: 250, width: 110, height: 230 });
            platforms.push({ x: 640, y: 200, width: 220, height: 280 });
            break;
        case 6:
            portal.x = 740; portal.y = 340;
            platforms.push({ x: 180, y: 320, width: 260, height: 30 }); 
            platforms.push({ x: 180, y: 430, width: 500, height: 50 }); 
            platforms.push({ x: 680, y: 430, width: 180, height: 50 });
            traps.push({ x: 300, y: -60, currentY: -60, width: 50, height: 50, triggerX: 220, type: 'falling', triggered: false });
            break;
        case 7:
            portal.x = 50; portal.y = 110;
            platforms.push({ x: 250, y: 400, width: 220, height: 30 });
            platforms.push({ x: 520, y: 300, width: 240, height: 30 });
            platforms.push({ x: 230, y: 200, width: 220, height: 30 });
            platforms.push({ x: 0, y: 200, width: 150, height: 30 });
            break;
        case 8:
            portal.x = 740; portal.y = 340;
            platforms.push({ x: 0, y: 430, width: 260, height: 50 });
            platforms.push({ x: 540, y: 430, width: 320, height: 50 });
            traps.push({ x: 610, y: 430, currentY: 430, width: 40, height: 40, targetY: 390, type: 'rising', triggerX: 570, triggered: false });
            break;
        case 9:
            portal.x = 740; portal.y = 110;
            platforms.push({ x: 180, y: 380, width: 60, height: 100 });
            platforms.push({ x: 300, y: 320, width: 60, height: 160 });
            platforms.push({ x: 420, y: 260, width: 60, height: 220 });
            platforms.push({ x: 540, y: 210, width: 60, height: 270 });
            platforms.push({ x: 660, y: 200, width: 200, height: 280 });
            break;
        case 10:
            portal.x = 740; portal.y = 340;
            platforms.push({ x: 150, y: 430, width: 200, height: 50 });
            platforms.push({ x: 350, y: 430, width: 220, height: 50 });
            platforms.push({ x: 570, y: 430, width: 300, height: 50 });
            traps.push({ x: 440, y: -60, currentY: -60, width: 55, height: 55, triggerX: 390, type: 'falling', triggered: false });
            break;
    }
}

function enterLevelSelector() {
    gameState = "MENU";
    document.getElementById("welcomeScreen").classList.add("hide");
    document.getElementById("homeScreen").classList.remove("hide");
    try { startSoftMelody(); } catch(e){}
    refreshUniverseMap();
}

function launchLevel(selectedLvl) {
    if (selectedLvl > maxUnlockedLevel) return;
    currentLevel = selectedLvl;
    saveProgress();
    
    document.getElementById("homeScreen").classList.add("hide");
    document.getElementById("controlsOverlay").classList.remove("hide");
    document.getElementById("backToMenuBtn").classList.remove("hide");
    
    gameState = "PLAYING";
    player.x = 40; player.y = 300; player.velX = 0; player.velY = 0;
    loadLevel(currentLevel);
}

function exitToMenu() {
    gameState = "MENU";
    document.getElementById("homeScreen").classList.remove("hide");
    document.getElementById("controlsOverlay").classList.add("hide");
    document.getElementById("backToMenuBtn").classList.add("hide");
    refreshUniverseMap();
}

let activeKeys = { Left: false, Right: false, Jump: false };
function bindControls() {
    const hook = (id, key) => {
        const el = document.getElementById(id);
        el.addEventListener("touchstart", (e) => { e.preventDefault(); activeKeys[key] = true; });
        el.addEventListener("touchend", (e) => { e.preventDefault(); activeKeys[key] = false; });
    };
    hook("btnLeft", "Left"); hook("btnRight", "Right"); hook("btnJump", "Jump");
    
    window.addEventListener("keydown", (e) => {
        if(e.key === "ArrowLeft" || e.key === "a") activeKeys.Left = true;
        if(e.key === "ArrowRight" || e.key === "d") activeKeys.Right = true;
        if(e.key === "ArrowUp" || e.key === "w" || e.key === " ") activeKeys.Jump = true;
    });
    window.addEventListener("keyup", (e) => {
        if(e.key === "ArrowLeft" || e.key === "a") activeKeys.Left = false;
        if(e.key === "ArrowRight" || e.key === "d") activeKeys.Right = false;
        if(e.key === "ArrowUp" || e.key === "w" || e.key === " ") activeKeys.Jump = false;
    });
}

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function update() {
    if (gameState !== "PLAYING" || isTransitioning) return;

    portalRotation += 0.03;

    if(Math.random() < 0.015) shootingStars.push({ x: Math.random()*600, y: 0, vx: 4, vy: 3, len: 25, alpha: 1 });
    for(let s of shootingStars) { s.x += s.vx; s.y += s.vy; s.alpha -= 0.02; }
    shootingStars = shootingStars.filter(s => s.alpha > 0);

    if (activeKeys.Jump && !player.jumping && player.grounded) {
        player.jumping = true; player.grounded = false; player.velY = -11.5;
    }
    if (activeKeys.Left) { if (player.velX > -player.speed) player.velX -= 0.75; }
    if (activeKeys.Right) { if (player.velX < player.speed) player.velX += 0.75; }

    player.velX *= friction; player.velY += gravity;
    player.grounded = false;

    player.x += player.velX;
    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.velX > 0) player.x = plat.x - player.width;
            else if (player.velX < 0) player.x = plat.x + plat.width;
        }
    }

    player.y += player.velY;
    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            if (player.velY > 0) {
                player.jumping = false; player.grounded = true; player.velY = 0;
                player.y = plat.y - player.height;
            } else if (player.velY < 0) {
                player.velY = 0; player.y = plat.y + plat.height;
            }
        }
    }

    if(player.x < 0) player.x = 0;
    if(player.x > canvas.width - player.width) player.x = canvas.width - player.width;
    if (player.y > canvas.height) playerDie();

    for (let trap of traps) {
        if (player.x >= trap.triggerX) trap.triggered = true;
        
        if (trap.type === 'rising' && trap.triggered && trap.currentY > trap.targetY) {
            trap.currentY -= 3.5;
        }
        if (trap.type === 'falling' && trap.triggered) {
            trap.currentY += 8.2;
        }

        let trapBox = { x: trap.x, y: trap.currentY, width: trap.width, height: trap.height };
        if (checkCollision(player, trapBox)) {
            playerDie();
        }
    }

    if (checkCollision(player, portal)) {
        triggerVictoryScreen();
    }
}

function triggerVictoryScreen() {
    isTransitioning = true;
    document.getElementById("victoryText").innerText = `Phase 0${currentLevel} Clear`;
    document.getElementById("victoryOverlay").classList.remove("hide");
    
    setTimeout(() => {
        document.getElementById("victoryOverlay").classList.add("hide");
        
        if (currentLevel === maxUnlockedLevel && maxUnlockedLevel < 10) {
            maxUnlockedLevel++;
        }
        if (currentLevel < 10) {
            currentLevel++;
        }
        
        saveProgress();
        player.x = 40; player.y = 300; player.velX = 0; player.velY = 0;
        loadLevel(currentLevel);
        isTransitioning = false;
    }, 2000);
}

function playerDie() {
    deaths++;
    saveProgress();
    player.x = 40; player.y = 300; player.velX = 0; player.velY = 0;
    loadLevel(currentLevel);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#070b12"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Twinkling Space Matrix Background
    ctx.fillStyle = "#fff";
    for(let s of stars) {
        ctx.globalAlpha = Math.abs(Math.sin(Date.now()*0.001 + s.alpha*10));
        ctx.fillRect(s.x, s.y, s.size, s.size);
    }
    ctx.globalAlpha = 1.0;

    for(let s of shootingStars) {
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath(); ctx.globalAlpha = s.alpha; ctx.lineWidth = 1.5;
        ctx.moveTo(s.x, s.y); ctx.lineTo(s.x - s.len, s.y - s.len*0.7); ctx.stroke();
    }
    ctx.globalAlpha = 1.0;

    if (gameState === "WELCOME" || gameState === "MENU") return;

    // Solid Level Geometry Blocks
    for (let plat of platforms) {
        ctx.fillStyle = "#111827"; ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
        ctx.fillStyle = "#4f46e5"; ctx.fillRect(plat.x, plat.y, plat.width, 3);
    }

    for (let trap of traps) {
        ctx.fillStyle = "#111827"; ctx.fillRect(trap.x, trap.currentY, trap.width, trap.height);
        ctx.fillStyle = "#4f46e5"; ctx.fillRect(trap.x, trap.currentY, trap.width, 3);
    }

    // Interactive Escape Portal Rings
    let pCenterX = portal.x + portal.width / 2;
    let pCenterY = portal.y + portal.height / 2;
    ctx.save(); ctx.translate(pCenterX, pCenterY); ctx.rotate(portalRotation);
    ctx.strokeStyle = "#22d3ee"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, 32, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = "#818cf8"; ctx.lineWidth = 2; ctx.setLineDash([6, 12]);
    ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();

    // Cosmic Player Character Box
    ctx.fillStyle = "#22d3ee"; 
    ctx.beginPath(); ctx.roundRect(player.x, player.y, player.width, player.height, 8); ctx.fill();
    ctx.fillStyle = "#0b0f17"; ctx.fillRect(player.x + 4, player.y + 6, player.width - 8, 8);

    // Dynamic Upper Dashboard Heads-up Panel
    ctx.fillStyle = "#64748b"; ctx.font = "bold 13px monospace";
    ctx.fillText(`PHASE LOG: 0${currentLevel} / 10`, 160, 36);
    ctx.fillText(`DEATH COUNTER: ${deaths}`, 540, 36);
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

// Ignition
initPersistence();
bindControls();
gameLoop();
</script>
